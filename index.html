<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincro MD - Chat VIP</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root { --p: #075e54; --s: #25d366; --bg: #e5ddd5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; background: white; position: relative; display: flex; flex-direction: column; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        .screen { display: none; padding: 20px; flex-direction: column; height: 100%; box-sizing: border-box; }
        .active { display: flex !important; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--p); color: white; }
        .header { background: var(--p); color: white; padding: 12px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; position: relative; }
        .me { background: #dcf8c6; align-self: flex-end; }
        .them { background: white; align-self: flex-start; }
        .locked-media { background: #bbb; height: 150px; display: flex; align-items: center; justify-content: center; border-radius: 8px; filter: blur(4px); margin-top: 5px; }
        .lock-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; z-index: 2; color: #444; font-weight: bold; }
        #admin-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-reg" class="screen active" style="text-align:center; justify-content:center;">
        <h2 style="color:var(--p)">Sincro MD</h2>
        <input type="text" id="reg-user" placeholder="Nombre de Usuario">
        <input type="email" id="reg-mail" placeholder="tu-correo@gmail.com">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        <button class="btn" onclick="enviarOTP()">RECIBIR CÓDIGO GMAIL</button>
        <p onclick="loginAdmin()" style="font-size:11px; color:#aaa; cursor:pointer; margin-top:15px;">Acceso Administrador</p>
    </div>

    <div id="scr-verify" class="screen" style="text-align:center; justify-content:center;">
        <h2>Verifica tu cuenta</h2>
        <input type="number" id="otp-input" placeholder="Código de 6 dígitos" style="text-align:center; font-size:24px;">
        <button class="btn" onclick="confirmarOTP()">ENTRAR AL CHAT</button>
    </div>

    <div id="scr-chat" class="screen" style="padding:0;">
        <div class="header">
            <b>Sincro MD</b>
            <button id="btn-adm" onclick="abrirAdmin()" style="display:none; background:orange; border:none; padding:5px; border-radius:5px; color:white; cursor:pointer;">ADMIN</button>
        </div>
        <div id="chat-box"></div>
        <div style="padding:10px; background:#eee; display:flex; gap:5px;">
            <input id="msg-in" placeholder="Escribe aquí..." style="margin:0;">
            <button onclick="enviarMsg('texto')" class="btn" style="width:50px;">></button>
            <button onclick="enviarMsg('foto')" class="btn" style="width:50px; background:#444;">📷</button>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Gestión de Usuarios</h3>
            <button onclick="cerrarAdmin()">Cerrar X</button>
        </div>
        <div id="lista-users"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    // CONFIGURACIÓN (REEMPLAZA CON TUS DATOS SI ES NECESARIO)
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    emailjs.init("BrWqcYWEajAbCMVYM"); 

    let datosTemp = {}, codigoReal = "", miUser = "", esAdmin = false, miPerfil = {};

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function enviarOTP() {
        const u = document.getElementById('reg-user').value.trim();
        const m = document.getElementById('reg-mail').value.trim();
        if(!u || !m) return alert("Completa los datos");
        codigoReal = Math.floor(100000 + Math.random() * 900000).toString();
        datosTemp = { user: u, mail: m, pass: document.getElementById('reg-pass').value };
        
        emailjs.send("service_ahvtgiw", "template_jsynwd9", { to_name: u, to_email: m, code: codigoReal })
            .then(() => { alert("Código enviado!"); view('scr-verify'); })
            .catch(() => alert("Error al enviar código. Revisa EmailJS."));
    }

    function confirmarOTP() {
        if(document.getElementById('otp-input').value === codigoReal) {
            miUser = datosTemp.user.toLowerCase().replace(/\s/g, '');
            miPerfil = { nombre: datosTemp.user, vip: false }; // VIP falso por defecto
            db.ref('sincro_users/' + miUser).set(miPerfil).then(() => entrarAlChat());
        } else { alert("Código incorrecto"); }
    }

    function entrarAlChat() {
        view('scr-chat');
        if(esAdmin) document.getElementById('btn-adm').style.display = "block";
        
        // Escuchar cambios en mi propio perfil (por si el admin me hace VIP)
        db.ref('sincro_users/' + miUser).on('value', s => { miPerfil = s.val() || miPerfil; });

        db.ref('sincro_mensajes').limitToLast(30).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(child => {
                const m = child.val();
                const d = document.createElement('div');
                d.className = "msg " + (m.u === miUser ? "me" : "them");
                
                if(m.type === "foto" && !miPerfil.vip && m.u !== miUser) {
                    d.innerHTML = `<b>${m.u}</b><br><div class="locked-media"></div><span class="lock-icon">🔒</span><small>Contenido VIP</small>`;
                } else {
                    d.innerHTML = `<b>${m.u}</b><br>${m.t}`;
                }
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg(tipo) {
        const txt = document.getElementById('msg-in').value;
        if(tipo === "texto" && !txt) return;
        db.ref('sincro_mensajes').push({ u: miUser, t: tipo === "foto" ? "📷 Foto enviada" : txt, type: tipo });
        document.getElementById('msg-in').value = "";
    }

    function loginAdmin() {
        const e = prompt("Email Admin:"), p = prompt("Clave Admin:");
        if(e && p) auth.signInWithEmailAndPassword(e, p).then(() => { esAdmin = true; miUser = "Admin"; entrarAlChat(); cargarAdmin(); }).catch(err => alert(err.message));
    }

    function abrirAdmin() { document.getElementById('admin-panel').style.display = "block"; }
    function cerrarAdmin() { document.getElementById('admin-panel').style.display = "none"; }

    function cargarAdmin() {
        db.ref('sincro_users').on('value', s => {
            const list = document.getElementById('lista-users');
            list.innerHTML = "";
            s.forEach(child => {
                const u = child.val();
                const div = document.createElement('div');
                div.style = "padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;";
                div.innerHTML = `<span>${u.nombre} ${u.vip ? '⭐' : ''}</span>`;
                const btn = document.createElement('button');
                btn.innerText = u.vip ? "Quitar VIP" : "Hacer VIP";
                btn.onclick = () => db.ref('sincro_users/' + child.key + '/vip').set(!u.vip);
                div.appendChild(btn);
                list.appendChild(div);
            });
        });
    }
</script>
</body>
</html>
