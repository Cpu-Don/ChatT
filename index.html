<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincro MD - Oficial</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --msg-out: #efffde; --side-bg: #ffffff; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0e1621; font-family: sans-serif; overflow: hidden; }
        #app { width: 100%; height: 100%; background: white; display: flex; overflow: hidden; position: relative; }

        /* Sidebars */
        #sidebar-left { width: 300px; background: var(--side-bg); border-right: 1px solid #dfe5ec; display: flex; flex-direction: column; z-index: 10; flex-shrink: 0; }
        #chat-section { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; min-width: 0; }

        @media (max-width: 1023px) {
            #sidebar-left { position: absolute; left: 0; transform: translateX(-100%); height: 100%; width: 85%; }
            .show-left { transform: translateX(0) !important; }
        }

        .header { height: 60px; padding: 0 15px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; background: white; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; }
        .me { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: #ffffff; border-bottom-left-radius: 2px; }
        .msg b { display: block; color: var(--tg-blue); font-size: 11px; margin-bottom: 4px; cursor: pointer; }

        footer { padding: 10px; background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        #msg-in { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }

        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        .bg-blue { background: #0088cc; color: white; }
        
        .status-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; }
        .section-label { padding: 10px 15px; background: #f1f4f7; font-size: 11px; font-weight: bold; color: #888; }
        .user-item { display:flex; align-items:center; padding:12px; cursor:pointer; border-bottom:1px solid #f2f2f2; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-login" class="screen bg-blue active">
        <h1>Sincro MD</h1>
        <input type="email" id="log-mail" style="padding:10px; margin:5px; border-radius:5px; border:none;" placeholder="Correo">
        <input type="password" id="log-pass" style="padding:10px; margin:5px; border-radius:5px; border:none;" placeholder="Contraseña">
        <button onclick="login()" style="padding:10px 20px; margin-top:10px; cursor:pointer;">Entrar</button>
        <p onclick="view('scr-reg')" style="font-size:12px; cursor:pointer;">Registrarse</p>
    </div>

    <div id="scr-reg" class="screen bg-blue">
        <h1>Registro</h1>
        <input type="text" id="reg-user" style="padding:10px; margin:5px; border-radius:5px; border:none;" placeholder="Nombre">
        <input type="email" id="reg-mail" style="padding:10px; margin:5px; border-radius:5px; border:none;" placeholder="Correo">
        <input type="password" id="reg-pass" style="padding:10px; margin:5px; border-radius:5px; border:none;" placeholder="Clave">
        <button onclick="registro()" style="padding:10px 20px; cursor:pointer;">Crear Cuenta</button>
        <p onclick="view('scr-login')" style="cursor:pointer;">Volver</p>
    </div>

    <div id="scr-chat" class="screen" style="flex-direction: row; padding: 0;">
        <aside id="sidebar-left">
            <div style="padding:15px; background:#0088cc; color:white; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
                <span id="mi-nombre-nav">SINCRO</span>
                <div>
                    <button onclick="cambiarNombre()" style="background:white; color:#0088cc; border:none; padding:4px 8px; border-radius:4px; font-size:10px; cursor:pointer; font-weight:bold;">EDITAR</button>
                    <span onclick="toggleMenu()" style="cursor:pointer; margin-left:10px;">✕</span>
                </div>
            </div>
            
            <div onclick="verChatPublico()" style="padding:15px; background:#e1e9f2; cursor:pointer; border-bottom:1px solid #ddd;">
                <b>Chat Público 🌐</b>
            </div>

            <div class="section-label">CHATS PRIVADOS 💬</div>
            <div id="recent-list" style="max-height: 180px; overflow-y:auto; border-bottom:1px solid #eee;"></div>

            <div class="section-label">PERSONAS 👥</div>
            <div id="people-list" style="overflow-y:auto; flex:1; background: #fff;"></div>

            <button onclick="logout()" style="padding:15px; background:#fcfcfc; border:none; color:red; cursor:pointer;">Cerrar Sesión</button>
        </aside>

        <main id="chat-section">
            <header class="header">
               <button onclick="toggleMenu()" style="border:none; background:none; font-size:24px; cursor:pointer;">☰</button>
               <b id="chat-title">Sincro MD</b>
               <div style="width:24px;"></div>
            </header>
            <div id="chat-box"></div>
            <footer>
               <button onclick="abrirCloudinary()" style="border:none; background:none; font-size:26px; cursor:pointer;">📎</button>
               <input id="msg-in" placeholder="Escribe un mensaje..." autocomplete="off">
               <button onclick="enviarMsg()" style="background:#0088cc; color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">➤</button>
            </footer>
        </main>
    </div>
</div>

<script>
    const firebaseConfig = { 
        databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/",
        apiKey: "AIzaSyB2GH_bFRmRwhqtaBb3ll_9eNEMXj7RuMo" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    
    let mUser = null, mData = { nombre: "" }, chatActual = "Sincro_Chat_Publico", listener = null;

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleMenu() { document.getElementById('sidebar-left').classList.toggle('show-left'); }

    // AUTH
    auth.onAuthStateChanged(user => {
        if (user) {
            mUser = user;
            db.ref('Sincro_Usuarios/' + user.uid).on('value', snap => {
                mData = snap.val();
                if(mData) {
                    document.getElementById('mi-nombre-nav').innerText = mData.nombre;
                    iniciarApp();
                }
            });
            db.ref('Sincro_Usuarios/' + user.uid + '/online').set(true);
            db.ref('Sincro_Usuarios/' + user.uid + '/online').onDisconnect().set(false);
        } else {
            view('scr-login');
        }
    });

    function registro() {
        const u = document.getElementById('reg-user').value, e = document.getElementById('reg-mail').value, p = document.getElementById('reg-pass').value;
        auth.createUserWithEmailAndPassword(e, p).then(res => {
            db.ref('Sincro_Usuarios/' + res.user.uid).set({ nombre: u, online: false });
            view('scr-login');
        });
    }

    function login() {
        const e = document.getElementById('log-mail').value, p = document.getElementById('log-pass').value;
        auth.signInWithEmailAndPassword(e, p);
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    // FUNCIONES CLAVE
    function cambiarNombre() {
        const n = prompt("Nuevo nombre:", mData.nombre);
        if(n && n.trim() !== "") db.ref('Sincro_Usuarios/' + mUser.uid + '/nombre').set(n.trim());
    }

    function iniciarApp() {
        view('scr-chat');
        
        // 1. LISTA DE PERSONAS (👥)
        db.ref('Sincro_Usuarios').on('value', snap => {
            const list = document.getElementById('people-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(child.key === mUser.uid) return;
                list.innerHTML += `
                <div class="user-item" onclick="iniciarPrivado('${child.key}', '${u.nombre}')">
                    <div style="width:35px; height:35px; border-radius:50%; background:#0088cc; color:white; display:flex; align-items:center; justify-content:center; margin-right:12px; font-weight:bold; position:relative;">
                        ${u.nombre[0].toUpperCase()}${u.online ? '<div class="status-dot"></div>' : ''}
                    </div>
                    <b>${u.nombre}</b>
                </div>`;
            });
        });

        // 2. CHATS PRIVADOS / RECIENTES (💬)
        db.ref('Sincro_Recientes/' + mUser.uid).on('value', snap => {
            const rec = document.getElementById('recent-list');
            rec.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                rec.innerHTML += `
                <div class="user-item" style="padding:10px 15px; border:none;" onclick="iniciarPrivado('${child.key}', '${r.nombre}')">
                    <span style="margin-right:10px;">👤</span>
                    <span style="font-size:13px; font-weight:bold;">${r.nombre}</span>
                </div>`;
            });
        });

        if(!listener) verChatPublico();
    }

    function escucharChat() {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        if(listener) db.ref(chatActual).off();
        listener = db.ref(chatActual).on('child_added', snap => {
            const data = snap.val(), isMine = data.uid === mUser.uid;
            const d = document.createElement('div'); d.className = "msg " + (isMine ? "me" : "them");
            d.innerHTML = `<b onclick="iniciarPrivado('${data.uid}', '${data.user}')">${data.user}</b><span>${data.msg}</span>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg() {
        const input = document.getElementById('msg-in'); if(!input.value.trim()) return;
        db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, msg: input.value });
        input.value = "";
    }

    function verChatPublico() {
        chatActual = "Sincro_Chat_Publico";
        document.getElementById('chat-title').innerText = "Chat Público 🌐";
        escucharChat();
    }

    function iniciarPrivado(id, nom) {
        if(id === mUser.uid) return;
        chatActual = "Sincro_Privados/" + [mUser.uid, id].sort().join("_");
        document.getElementById('chat-title').innerText = nom;
        // Guardar en recientes para que no desaparezca la opción
        db.ref('Sincro_Recientes/' + mUser.uid + '/' + id).set({ nombre: nom });
        escucharChat();
        if(window.innerWidth < 1024) toggleMenu();
    }

    function abrirCloudinary() {
        cloudinary.openUploadWidget({ cloudName: "dhtyepcjg", uploadPreset: "Historial" }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, msg: "Sent a file", url: res.info.secure_url, type: 'media' });
            }
        });
    }
</script>
</body>
</html>
