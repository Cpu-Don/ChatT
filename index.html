<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincro MD - Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --main-blue: #0088cc; --bg-dark: #0e1621; --chat-bg: #17212b; --text-color: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body, html { height: 100%; width: 100%; background: var(--bg-dark); overflow: hidden; }
        #app { display: flex; width: 100%; height: 100%; position: relative; }

        /* Sidebar mejorado */
        #sidebar { 
            width: 320px; background: #ffffff; display: flex; flex-direction: column; 
            border-right: 1px solid #ddd; z-index: 100; transition: transform 0.3s ease;
        }

        /* Pantalla de Chat */
        #chat-section { flex: 1; display: flex; flex-direction: column; background: #54759e; position: relative; }

        @media (max-width: 1023px) {
            #sidebar { position: absolute; left: 0; top: 0; height: 100%; transform: translateX(-100%); width: 85%; }
            .show-sidebar { transform: translateX(0) !important; }
        }

        /* Cabeceras */
        .header { height: 60px; background: white; display: flex; align-items: center; padding: 0 15px; border-bottom: 1px solid #eee; justify-content: space-between; }
        .sidebar-header { background: var(--main-blue); color: white; padding: 20px 15px; }

        /* Lista de Usuarios */
        .section-title { padding: 10px 15px; background: #f4f4f7; font-size: 11px; font-weight: bold; color: #888; text-transform: uppercase; }
        .user-card { display: flex; align-items: center; padding: 12px 15px; cursor: pointer; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .user-card:hover { background: #f9f9f9; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--main-blue); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; position: relative; margin-right: 12px; }
        .online-dot { width: 12px; height: 12px; background: #4caf50; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; }

        /* Burbujas de Chat */
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); line-height: 1.4; }
        .me { align-self: flex-end; background: #efffde; border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: #ffffff; border-bottom-left-radius: 2px; }
        .msg b { display: block; font-size: 11px; color: var(--main-blue); margin-bottom: 3px; cursor: pointer; }

        /* Entrada de texto */
        .footer { padding: 10px; background: white; display: flex; align-items: center; gap: 10px; border-top: 1px solid #ddd; }
        #msg-in { flex: 1; padding: 12px 18px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 15px; }
        .send-btn { background: var(--main-blue); color: white; border: none; width: 42px; height: 42px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        /* Pantallas de inicio */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; justify-content: center; background: var(--main-blue); color: white; }
        .active { display: flex; }
        .input-auth { padding: 12px; width: 80%; max-width: 300px; border-radius: 8px; border: none; margin: 8px 0; outline: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-login" class="screen active">
        <h1 style="font-size: 40px; margin-bottom: 20px;">Sincro MD</h1>
        <input type="email" id="log-mail" class="input-auth" placeholder="Correo">
        <input type="password" id="log-pass" class="input-auth" placeholder="Contraseña">
        <button onclick="login()" style="padding: 12px 40px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; background: white; color: var(--main-blue);">ENTRAR</button>
        <p onclick="view('scr-reg')" style="margin-top: 20px; font-size: 13px; cursor: pointer; text-decoration: underline;">Registrarse</p>
    </div>

    <div id="scr-reg" class="screen">
        <h1>Registro</h1>
        <input type="text" id="reg-user" class="input-auth" placeholder="Nombre de Usuario">
        <input type="email" id="reg-mail" class="input-auth" placeholder="Correo">
        <input type="password" id="reg-pass" class="input-auth" placeholder="Clave (6+ carac.)">
        <button onclick="registro()" style="padding: 12px 40px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; background: white; color: var(--main-blue);">CREAR CUENTA</button>
        <p onclick="view('scr-login')" style="margin-top: 20px; cursor: pointer;">Volver</p>
    </div>

    <div id="scr-chat" class="screen" style="flex-direction: row; background: white;">
        <aside id="sidebar">
            <div class="sidebar-header">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <b style="font-size: 18px;" id="mi-nombre-nav">Sincro</b>
                    <button onclick="cambiarNombre()" style="background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; font-weight: bold;">EDITAR</button>
                </div>
                <div style="font-size: 12px; opacity: 0.8;">En línea ahora</div>
            </div>

            <div onclick="verChatPublico()" style="padding: 15px; border-bottom: 1px solid #ddd; cursor: pointer; font-weight: bold; background: #eef5f9;">
                🌐 Chat Público
            </div>

            <div class="section-title">Chats Privados 💬</div>
            <div id="recent-list" style="max-height: 150px; overflow-y: auto;"></div>

            <div class="section-title">Personas 👥</div>
            <div id="people-list" style="flex: 1; overflow-y: auto;"></div>

            <button onclick="logout()" style="padding: 15px; border: none; color: #d9534f; background: #fff; cursor: pointer; border-top: 1px solid #eee; font-weight: bold;">Cerrar Sesión</button>
        </aside>

        <main id="chat-section">
            <header class="header">
                <button onclick="toggleSidebar()" style="border: none; background: none; font-size: 24px; cursor: pointer;">☰</button>
                <div style="text-align: center;">
                    <b id="chat-title">Cargando...</b>
                    <div id="chat-status" style="font-size: 10px; color: #888;"></div>
                </div>
                <div style="width: 30px;"></div>
            </header>

            <div id="chat-box"></div>

            <footer class="footer">
                <button onclick="abrirCloudinary()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #888;">📎</button>
                <input id="msg-in" placeholder="Escribe un mensaje..." autocomplete="off">
                <button onclick="enviarMsg()" class="send-btn">➤</button>
            </footer>
        </main>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { 
        databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/",
        apiKey: "AIzaSyB2GH_bFRmRwhqtaBb3ll_9eNEMXj7RuMo" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();

    let mUser = null, mData = null, chatActual = "Sincro_Chat_Publico", listener = null;

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('show-sidebar'); }

    // AUTH LÓGICA
    auth.onAuthStateChanged(user => {
        if (user) {
            mUser = user;
            db.ref('Sincro_Usuarios/' + user.uid).on('value', snap => {
                mData = snap.val();
                if(mData) {
                    document.getElementById('mi-nombre-nav').innerText = mData.nombre;
                    iniciarApp();
                }
            });
            db.ref('Sincro_Usuarios/' + user.uid + '/online').set(true);
            db.ref('Sincro_Usuarios/' + user.uid + '/online').onDisconnect().set(false);
        } else {
            view('scr-login');
        }
    });

    function registro() {
        const u = document.getElementById('reg-user').value.trim(), e = document.getElementById('reg-mail').value.trim(), p = document.getElementById('reg-pass').value;
        if(!u || !e) return alert("Completa los campos");
        auth.createUserWithEmailAndPassword(e, p).then(res => {
            db.ref('Sincro_Usuarios/' + res.user.uid).set({ nombre: u, online: false });
            view('scr-login');
        }).catch(err => alert(err.message));
    }

    function login() {
        const e = document.getElementById('log-mail').value.trim(), p = document.getElementById('log-pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => alert(err.message));
    }

    function logout() { auth.signOut().then(() => location.reload()); }

    // CAMBIAR NOMBRE
    function cambiarNombre() {
        const n = prompt("Escribe tu nuevo nombre de usuario:", mData.nombre);
        if(n && n.trim() !== "") {
            db.ref('Sincro_Usuarios/' + mUser.uid + '/nombre').set(n.trim());
        }
    }

    function iniciarApp() {
        view('scr-chat');
        
        // CARGAR TODOS LOS USUARIOS Y SU ESTADO ONLINE
        db.ref('Sincro_Usuarios').on('value', snap => {
            const people = document.getElementById('people-list');
            people.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(child.key === mUser.uid) return;
                
                people.innerHTML += `
                <div class="user-card" onclick="iniciarPrivado('${child.key}', '${u.nombre}')">
                    <div class="avatar">${u.nombre[0].toUpperCase()}${u.online ? '<div class="online-dot"></div>' : ''}</div>
                    <div>
                        <b style="font-size:14px; color:${u.online?'#000':'#888'}">${u.nombre}</b><br>
                        <small style="font-size:10px; color:${u.online?'#4caf50':'#aaa'}">${u.online?'En línea':'Desconectado'}</small>
                    </div>
                </div>`;
            });
        });

        // CARGAR CHATS RECIENTES (PRIVADOS)
        db.ref('Sincro_Recientes/' + mUser.uid).on('value', snap => {
            const recent = document.getElementById('recent-list');
            recent.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                recent.innerHTML += `
                <div class="user-card" style="padding: 10px 15px; border:none;" onclick="iniciarPrivado('${child.key}', '${r.nombre}')">
                    <span style="margin-right:10px;">💬</span>
                    <b style="font-size:13px;">${r.nombre}</b>
                </div>`;
            });
        });

        if(!listener) verChatPublico();
    }

    function escucharChat() {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        if(listener) db.ref(chatActual).off();
        listener = db.ref(chatActual).on('child_added', snap => {
            const data = snap.val(), isMine = data.uid === mUser.uid;
            const d = document.createElement('div'); d.className = "msg " + (isMine ? "me" : "them");
            d.innerHTML = `<b onclick="iniciarPrivado('${data.uid}', '${data.user}')">${data.user}</b><span>${data.msg}</span>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg() {
        const input = document.getElementById('msg-in'); if(!input.value.trim()) return;
        db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, msg: input.value, timestamp: Date.now() });
        input.value = "";
    }

    function verChatPublico() {
        chatActual = "Sincro_Chat_Publico";
        document.getElementById('chat-title').innerText = "Chat Público";
        document.getElementById('chat-status').innerText = "Grupo General";
        escucharChat();
    }

    function iniciarPrivado(id, nom) {
        if(id === mUser.uid) return;
        chatActual = "Sincro_Privados/" + [mUser.uid, id].sort().join("_");
        document.getElementById('chat-title').innerText = nom;
        document.getElementById('chat-status').innerText = "Chat Privado";
        db.ref('Sincro_Recientes/' + mUser.uid + '/' + id).set({ nombre: nom });
        escucharChat();
        if(window.innerWidth < 1024) toggleSidebar();
    }

    function abrirCloudinary() {
        cloudinary.openUploadWidget({ cloudName: "dhtyepcjg", uploadPreset: "Historial" }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, msg: "Envió un archivo", url: res.info.secure_url, type: 'media' });
            }
        });
    }
</script>
</body>
</html>
