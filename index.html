<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>TEST FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

    <div id="setup">
        <h1>Sincro MD - Test de Botón</h1>
        <input type="text" id="nombre" placeholder="Tu nombre">
        <button id="botonEntrar" style="padding:20px; background:green; color:white;">PROBAR ENTRADA</button>
    </div>

    <div id="chat" style="display:none;">
        <h2>Estás en el chat</h2>
        <input type="text" id="mensaje" placeholder="Mensaje">
        <button id="botonEnviar">Enviar</button>
        <div id="mensajes"></div>
    </div>

<script>
    // 1. Configuración ultra simple
    var config = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(config);
    var db = firebase.database();

    // 2. Lógica del botón con EventListener (Más seguro que onclick)
    document.getElementById("botonEntrar").addEventListener("click", function() {
        var user = document.getElementById("nombre").value;
        
        if(user === "") {
            alert("Por favor escribe un nombre");
            return;
        }

        alert("Botón funcionando. Intentando conectar a Firebase...");

        db.ref("sincro_users/" + user).set({
            nombre: user,
            test: "ok"
        }).then(function() {
            alert("¡Conectado! Entrando al chat...");
            document.getElementById("setup").style.display = "none";
            document.getElementById("chat").style.display = "block";
        }).catch(function(error) {
            alert("Error de Firebase: " + error.message);
        });
    });

    // 3. Lógica de mensajes
    document.getElementById("botonEnviar").addEventListener("click", function() {
        var m = document.getElementById("mensaje").value;
        db.ref("sincro_mensajes").push({ t: m });
        document.getElementById("mensaje").value = "";
    });

    db.ref("sincro_mensajes").limitToLast(10).on("value", function(s) {
        var html = "";
        s.forEach(function(c) {
            html += "<p>" + c.val().t + "</p>";
        });
        document.getElementById("mensajes").innerHTML = html;
    });
</script>

</body>
</html>
