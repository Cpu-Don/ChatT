<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincro MD - Configuración Final</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --p: #075e54; --bg: #e5ddd5; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; padding: 25px; flex-direction: column; height: 100%; box-sizing: border-box; text-align: center; }
        .active { display: flex !important; }
        input { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 16px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; background: var(--p); color: white; }
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 80%; font-size: 14px; text-align: left; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me { background: #dcf8c6; align-self: flex-end; }
        .them { background: white; align-self: flex-start; }
        .locked { background: #777; height: 100px; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-reg" class="screen active" style="justify-content:center;">
        <h1 style="color:var(--p)">Sincro MD</h1>
        <input type="text" id="reg-user" placeholder="Usuario">
        <input type="email" id="reg-mail" placeholder="correo@gmail.com">
        <button class="btn" onclick="enviarOTP()">RECIBIR CÓDIGO GMAIL</button>
    </div>

    <div id="scr-verify" class="screen" style="justify-content:center;">
        <h2>Verifica tu Correo</h2>
        <input type="number" id="otp-input" placeholder="000000" style="text-align:center; font-size:26px;">
        <button class="btn" onclick="confirmarOTP()">ENTRAR AL CHAT</button>
    </div>

    <div id="scr-chat" class="screen" style="padding:0;">
        <div class="header"><b>Sincro MD</b></div>
        <div id="chat-box"></div>
        <div style="padding:10px; background:#eee; display:flex; gap:5px;">
            <input id="msg-in" placeholder="Escribe..." style="margin:0;">
            <button onclick="enviarMsg('texto')" class="btn" style="width:50px; margin:0;">></button>
            <button onclick="enviarMsg('foto')" class="btn" style="width:50px; margin:0; background:#444;">📷</button>
        </div>
    </div>
</div>

<script>
    // CONFIGURACIÓN (Rutas ajustadas a tus reglas)
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    emailjs.init("BrWqcYWEajAbCMVYM");

    let dTemp = {}, codeReal = "", mUser = "", mPerf = { vip: false };

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // 1. REGISTRO (Ajustado a la carpeta "usuarios")
    function enviarOTP() {
        const u = document.getElementById('reg-user').value.trim();
        const m = document.getElementById('reg-mail').value.trim();
        if(!u || !m) return alert("Llena los campos");

        codeReal = Math.floor(100000 + Math.random() * 900000).toString();
        dTemp = { user: u, mail: m };

        emailjs.send("service_ahvtgiw", "template_jsynwd9", { to_name: u, to_email: m, code: codeReal })
        .then(() => { alert("Código enviado!"); view('scr-verify'); })
        .catch(() => alert("Error al conectar con Gmail"));
    }

    function confirmarOTP() {
        if(document.getElementById('otp-input').value === codeReal) {
            mUser = dTemp.user.toLowerCase().replace(/\s/g, '');
            // Ruta "usuarios" según tus reglas
            db.ref('usuarios/' + mUser).set({ 
                nombre: dTemp.user, 
                correo: dTemp.mail, 
                vip: false 
            }).then(() => entrar());
        } else { alert("Código incorrecto"); }
    }

    // 2. CHAT (Ajustado a la carpeta "mensajes")
    function entrar() {
        view('scr-chat');
        // Escuchar perfil en carpeta "usuarios"
        db.ref('usuarios/' + mUser).on('value', s => { if(s.exists()) mPerf = s.val(); });
        
        // Escuchar mensajes en carpeta "mensajes"
        db.ref('mensajes').limitToLast(25).on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = "";
            s.forEach(c => {
                const m = c.val(); const d = document.createElement('div');
                d.className = "msg " + (m.u === mUser ? "me" : "them");
                if(m.type === "foto" && !mPerf.vip && m.u !== mUser) {
                    d.innerHTML = `<b>${m.u}</b><br><div class="locked">🔒 VIP SOLAMENTE</div>`;
                } else { d.innerHTML = `<b>${m.u}</b><br>${m.t}`; }
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function enviarMsg(t) {
        const i = document.getElementById('msg-in');
        if(t === "texto" && !i.value.trim()) return;
        // Escritura en carpeta "mensajes" según tus reglas
        db.ref('mensajes').push({ 
            u: mUser, 
            t: t === "foto" ? "📷 Foto Compartida" : i.value, 
            type: t 
        });
        i.value = "";
    }
</script>
</body>
</html>
