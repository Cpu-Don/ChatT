<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincro MD - Verificado</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --msg-out: #efffde; --side-bg: #ffffff; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0e1621; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        #app { width: 100%; height: 100%; background: white; display: flex; overflow: hidden; position: relative; }
        @media (min-width: 1024px) { #app { width: 98%; height: 95vh; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); } }

        /* Notificaciones */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; }
        .toast { background: rgba(0, 0, 0, 0.9); color: white; padding: 12px 25px; border-radius: 50px; font-size: 14px; margin-bottom: 10px; animation: slideIn 0.3s forwards; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* Estructura */
        #sidebar-left, #sidebar-right { width: 300px; background: var(--side-bg); border: 1px solid #dfe5ec; display: flex; flex-direction: column; z-index: 10; transition: transform 0.3s ease; }
        #chat-section { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; }

        @media (max-width: 1023px) {
            #sidebar-left { position: absolute; left: 0; transform: translateX(-100%); height: 100%; width: 85%; }
            #sidebar-right { position: absolute; right: 0; transform: translateX(100%); height: 100%; width: 85%; }
            .show-left { transform: translateX(0) !important; }
            .show-right { transform: translateX(0) !important; }
        }

        /* Mensajes */
        .header { padding: 15px; background: white; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; background: white; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); cursor: pointer; position: relative; }
        .me { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: #ffffff; border-bottom-left-radius: 2px; }
        .msg b { display: block; color: var(--tg-blue); font-size: 11px; margin-bottom: 3px; }

        /* Media */
        .media-container { margin-top: 5px; border-radius: 10px; overflow: hidden; position: relative; background: #000; min-height: 150px; }
        .blur { filter: blur(35px); pointer-events: none; opacity: 0.6; }
        .lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.5); color: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; z-index: 5; }

        .status-dot { width: 10px; height: 10px; background: #4caf50; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 2px; right: 2px; }

        /* UI de Acceso */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        .bg-blue { background: linear-gradient(135deg, #0088cc, #004466); color: white; }
        .in-style { padding:14px; width:300px; margin-top:10px; border-radius:10px; border:none; outline:none; }
        .btn-main { padding:14px; width:300px; margin-top:20px; border-radius:10px; border:none; background: white; color:#0088cc; font-weight:bold; cursor:pointer; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="app">
    <div id="scr-login" class="screen bg-blue active">
        <h1 style="font-size: 40px; margin-bottom: 0;">Sincro MD</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">Inicia sesión para chatear</p>
        <input type="email" id="log-mail" class="in-style" placeholder="Correo Electrónico">
        <input type="password" id="log-pass" class="in-style" placeholder="Contraseña">
        <button onclick="login()" class="btn-main">ENTRAR</button>
        <p onclick="view('scr-reg')" style="cursor:pointer; margin-top:20px; text-decoration: underline;">Crear una cuenta nueva</p>
    </div>

    <div id="scr-reg" class="screen bg-blue">
        <h1>Registro Seguro</h1>
        <input type="text" id="reg-user" class="in-style" placeholder="Nombre de Usuario">
        <input type="email" id="reg-mail" class="in-style" placeholder="Tu Correo Real">
        <input type="password" id="reg-pass" class="in-style" placeholder="Clave (6+ caracteres)">
        <button onclick="registro()" class="btn-main">REGISTRARME</button>
        <p onclick="view('scr-login')" style="cursor:pointer; margin-top:20px;">Volver al inicio</p>
    </div>

    <div id="scr-chat" class="screen" style="flex-direction: row; height: 100vh; width: 100%; padding:0;">
        
        <aside id="sidebar-left">
            <div style="padding:15px; background:#0088cc; color:white; font-weight:bold; display:flex; justify-content:space-between;">
                SINCRO <span>v2</span>
            </div>
            <div onclick="verChatPublico()" style="padding:15px; background:#e1e9f2; cursor:pointer;"><b>Chat Público 🌐</b></div>
            <div style="padding:10px; font-size:11px; color:#999;">USUARIOS</div>
            <div id="miembros-list" style="overflow-y:auto; flex:1;"></div>
            <button onclick="logout()" style="padding:15px; width:100%; background:#FFF0F0; border:none; color:#d9534f; cursor:pointer; font-weight:bold;">Cerrar Sesión</button>
        </aside>

        <main id="chat-section">
            <header class="header">
               <button onclick="toggleMenu('left')" style="border:none; background:none; font-size:20px; cursor:pointer;">☰</button>
               <div style="text-align:center;">
                   <span id="chat-title" style="display:block;">Cargando...</span>
                   <small id="chat-status" style="font-size:10px; color:#888; font-weight:normal;"></small>
               </div>
               <button onclick="toggleMenu('right')" style="border:none; background:none; font-size:20px; cursor:pointer;">ℹ️</button>
            </header>

            <div id="chat-box"></div>

            <footer style="padding:12px; background:white; display:flex; gap:10px; align-items:center; border-top:1px solid #ddd;">
               <button onclick="abrirCloudinary()" style="border:none; background:none; font-size:24px; cursor:pointer;">📎</button>
               <input id="msg-in" placeholder="Escribe un mensaje..." style="flex:1; padding:10px; border-radius:20px; border:1px solid #ddd; outline:none;">
               <button onclick="enviarMsg()" style="background:#0088cc; color:white; border:none; width:40px; height:40px; border-radius:50%; cursor:pointer;">➤</button>
            </footer>
        </main>

        <aside id="sidebar-right">
            <div style="padding:20px; text-align:center; border-bottom:1px solid #eee;">
                <div id="group-icon" style="width:70px; height:70px; background:#0088cc; color:white; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold;">S</div>
                <h3 id="info-name" style="margin:5px 0;">Sincro Group</h3>
                <button id="btn-edit-group" onclick="editarNombreGrupo()" style="display:none; background:none; border:1px solid #0088cc; color:#0088cc; border-radius:5px; padding:3px 8px; font-size:11px; cursor:pointer;">Editar Nombre</button>
            </div>
            
            <div style="padding:10px; background:#f8f9fa; font-weight:bold; font-size:12px; color:#666;">MULTIMEDIA</div>
            <div id="gallery" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px; padding:10px; overflow-y:auto; flex:1;"></div>
            
            <div style="padding:10px; background:#f8f9fa; font-weight:bold; font-size:12px; color:#666; border-top:1px solid #eee;">ACCIONES</div>
            <div style="padding:10px;">
                <button onclick="vaciarChat()" style="width:100%; padding:10px; background:#fff; border:1px solid #d9534f; color:#d9534f; border-radius:5px; cursor:pointer; font-size:12px;">Vaciar Historial</button>
            </div>
        </aside>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN ---
    const firebaseConfig = { 
        databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/",
        apiKey: "AIzaSyB2GH_bFRmRwhqtaBb3ll_9eNEMXj7RuMo" 
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    const CLOUD_NAME = "dhtyepcjg"; 
    const UPLOAD_PRESET = "Historial";

    let mUser = null, mData = { vip: false, nombre: "" }, chatActual = "chats/publico", listener = null;

    function notify(t) {
        const c = document.getElementById('toast-container');
        const e = document.createElement('div'); e.className = 'toast'; e.innerText = t;
        c.appendChild(e); setTimeout(() => e.remove(), 4000);
    }

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleMenu(s) { document.getElementById('sidebar-' + s).classList.toggle('show-' + s); }

    // --- ACCESO ---
    function registro() {
        const u = document.getElementById('reg-user').value.trim();
        const e = document.getElementById('reg-mail').value.trim();
        const p = document.getElementById('reg-pass').value;
        if(!u || !e || p.length < 6) return notify("⚠️ Datos incompletos");

        auth.createUserWithEmailAndPassword(e, p).then(res => {
            res.user.sendEmailVerification().then(() => notify("📧 Verifica tu correo."));
            db.ref('usuarios/' + res.user.uid).set({ 
                nombre: u, 
                vip: (u.toLowerCase() === 'chat'),
                online: false 
            });
            setTimeout(() => { auth.signOut(); view('scr-login'); }, 3000);
        }).catch(err => notify("❌ " + err.message));
    }

    function login() {
        const e = document.getElementById('log-mail').value.trim();
        const p = document.getElementById('log-pass').value;
        if(!e || !p) return notify("⚠️ Ingresa tus datos");

        auth.signInWithEmailAndPassword(e, p).then(res => {
            if (!res.user.emailVerified) {
                notify("🚫 Verifica tu correo primero.");
                auth.signOut();
            }
        }).catch(() => notify("❌ Datos incorrectos"));
    }

    function logout() { 
        if(mUser) db.ref('usuarios/' + mUser.uid + '/online').set(false);
        auth.signOut().then(() => location.reload()); 
    }

    // --- MONITOR DE ESTADO ---
    auth.onAuthStateChanged(user => {
        if (user && user.emailVerified) {
            mUser = user;
            db.ref('usuarios/' + user.uid).on('value', snap => {
                mData = snap.val();
                if(mData) {
                    if(mData.nombre.toLowerCase() === 'chat') mData.vip = true;
                    iniciarApp();
                }
            });
            db.ref('usuarios/' + user.uid + '/online').set(true);
            db.ref('usuarios/' + user.uid + '/online').onDisconnect().set(false);
        } else { 
            view('scr-login'); 
        }
    });

    function iniciarApp() {
        view('scr-chat');
        // Botón editar nombre (Solo para el usuario "chat")
        document.getElementById('btn-edit-group').style.display = mData.vip ? 'inline-block' : 'none';

        db.ref('usuarios').on('value', snap => {
            const list = document.getElementById('miembros-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(child.key === mUser.uid) return;
                list.innerHTML += `<div onclick="iniciarPrivado('${child.key}', '${u.nombre}')" style="display:flex; align-items:center; padding:12px; cursor:pointer; position:relative; border-bottom:1px solid #f9f9f9;">
                    <div style="width:35px; height:35px; border-radius:50%; background:#0088cc; color:white; display:flex; align-items:center; justify-content:center; margin-right:10px; font-weight:bold; position:relative;">
                        ${u.nombre[0].toUpperCase()}
                        ${u.online ? '<div class="status-dot"></div>' : ''}
                    </div>
                    <div>
                        <b style="font-size:14px;">${u.nombre}</b><br>
                        <small style="color:${u.online ? '#4caf50' : '#aaa'}; font-size:10px;">${u.online ? 'en línea' : 'desconectado'}</small>
                    </div>
                </div>`;
            });
        });

        // Cargar nombre del grupo desde DB
        db.ref('config/nombreGrupo').on('value', snap => {
            const nombre = snap.val() || "Sincro MD";
            if(chatActual === "chats/publico") {
                document.getElementById('chat-title').innerText = nombre;
                document.getElementById('info-name').innerText = nombre;
                document.getElementById('group-icon').innerText = nombre[0].toUpperCase();
            }
        });

        if(!listener) verChatPublico();
    }

    function editarNombreGrupo() {
        const n = prompt("Nuevo nombre del grupo:");
        if(n) db.ref('config/nombreGrupo').set(n);
    }

    // --- MENSAJES ---
    function escucharChat() {
        const box = document.getElementById('chat-box');
        const gal = document.getElementById('gallery');
        box.innerHTML = ""; gal.innerHTML = "";
        if(listener) db.ref(chatActual).off();

        listener = db.ref(chatActual).on('child_added', snap => {
            const data = snap.val();
            const isMine = data.uid === mUser.uid;
            const d = document.createElement('div');
            d.className = "msg " + (isMine ? "me" : "them");
            d.id = "m-" + snap.key;
            
            d.onclick = () => {
                if(mData.vip && confirm("¿Borrar mensaje?")) db.ref(chatActual + "/" + snap.key).remove();
            };

            let html = `<b>${data.user}</b>`;
            if(data.type === 'foto' || data.type === 'video') {
                const locked = !mData.vip && !isMine;
                const mediaHtml = data.type === 'video' 
                    ? `<video src="${data.url}" controls style="width:100%; border-radius:8px;"></video>`
                    : `<img src="${data.url}" style="width:100%; border-radius:8px;">`;

                html += `<div class="media-container ${locked?'blur':''}">
                    ${locked ? '<div class="lock-overlay">🔒 SOLO VIP</div>' : ''}
                    ${mediaHtml}</div>`;
                
                // Agregar a Galería lateral
                const itemGal = document.createElement('div');
                itemGal.style.height = "60px";
                itemGal.style.background = "#eee";
                itemGal.style.borderRadius = "4px";
                itemGal.style.overflow = "hidden";
                itemGal.innerHTML = data.type === 'video' ? `<video src="${data.url}" style="width:100%; height:100%; object-fit:cover;"></video>` : `<img src="${data.url}" style="width:100%; height:100%; object-fit:cover;">`;
                gal.prepend(itemGal);

            } else { html += `<span>${data.msg}</span>`; }
            
            d.innerHTML = html;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });

        db.ref(chatActual).on('child_removed', snap => {
            const el = document.getElementById("m-" + snap.key);
            if(el) el.remove();
        });
    }

    function enviarMsg() {
        const input = document.getElementById('msg-in');
        if(!input.value.trim()) return;
        db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, msg: input.value, type: 'texto' });
        input.value = "";
    }

    function abrirCloudinary() {
        cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET }, (err, res) => {
            if (!err && res.event === "success") {
                const tipo = res.info.resource_type === 'video' ? 'video' : 'foto';
                db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, url: res.info.secure_url, type: tipo });
            }
        });
    }

    function verChatPublico() {
        chatActual = "chats/publico";
        document.getElementById('chat-status').innerText = "Grupo Público";
        db.ref('config/nombreGrupo').once('value', s => {
            document.getElementById('chat-title').innerText = s.val() || "Chat Público 🌐";
        });
        escucharChat();
    }

    function iniciarPrivado(targetUid, nombre) {
        const chatID = [mUser.uid, targetUid].sort().join("_");
        chatActual = "privados/" + chatID;
        document.getElementById('chat-title').innerText = nombre;
        document.getElementById('info-name').innerText = nombre;
        document.getElementById('group-icon').innerText = nombre[0].toUpperCase();
        document.getElementById('chat-status').innerText = "Chat Privado";
        escucharChat();
        if(window.innerWidth < 1024) toggleMenu('left');
    }

    function vaciarChat() {
        if(confirm("⚠️ ¿Eliminar historial?")) db.ref(chatActual).remove();
    }
</script>
</body>
</html>
