<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincro MD - Login</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --msg-out: #efffde; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 1000px; height: 95vh; margin: auto; background: white; display: flex; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); position: relative; }

        /* --- PANTALLAS --- */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center; box-sizing: border-box; }
        .active { display: flex; }
        
        .bg-blue { background: linear-gradient(135deg, var(--tg-blue), #004466); color: white; }
        .in-style { width: 100%; max-width: 300px; padding: 15px; margin: 8px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        .btn-style { width: 100%; max-width: 300px; padding: 15px; border-radius: 10px; border: none; background: white; color: var(--tg-blue); font-weight: bold; cursor: pointer; margin-top: 10px; }

        /* --- LAYOUT CHAT --- */
        #main-chat { display: flex; width: 100%; height: 100%; }
        #sidebar { width: 30%; background: #f8f9fa; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        #chat-section { width: 70%; display: flex; flex-direction: column; background: var(--tg-bg); }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 75%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); background: white; }
        .me { background: var(--msg-out); align-self: flex-end; }
        .footer { padding: 15px; background: white; display: flex; gap: 10px; }
        #msg-in { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-login" class="screen bg-blue active">
        <h1>Sincro MD</h1>
        <p>Inicia sesión para continuar</p>
        <input type="text" id="log-user" class="in-style" placeholder="Nombre de usuario">
        <input type="password" id="log-pass" class="in-style" placeholder="Tu Contraseña">
        <button class="btn-style" onclick="login()">ENTRAR</button>
        <p onclick="view('scr-reg')" style="cursor:pointer; font-size:14px; text-decoration:underline;">¿No tienes cuenta? Regístrate</p>
    </div>

    <div id="scr-reg" class="screen bg-blue">
        <h1>Crear Cuenta</h1>
        <input type="text" id="reg-user" class="in-style" placeholder="Nombre de usuario">
        <input type="email" id="reg-mail" class="in-style" placeholder="tu-correo@gmail.com">
        <input type="password" id="reg-pass" class="in-style" placeholder="Crea una clave">
        <button class="btn-style" onclick="enviarOTP()">RECIBIR CÓDIGO</button>
        <p onclick="view('scr-login')" style="cursor:pointer; font-size:14px;">Ya tengo cuenta</p>
    </div>

    <div id="scr-verify" class="screen">
        <h2>Verifica tu correo</h2>
        <input type="number" id="otp-input" class="in-style" style="background:#eee; text-align:center; font-size:25px;">
        <button class="btn-style" style="background:var(--tg-blue); color:white;" onclick="confirmarOTP()">VERIFICAR</button>
    </div>

    <div id="scr-chat" class="screen" style="padding:0;">
        <div id="main-chat">
            <div id="sidebar">
                <div style="padding:15px; background:#eee; font-weight:bold; border-bottom:1px solid #ddd;">Galería VIP</div>
                <div id="media-list" style="padding:10px; display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div>
            </div>
            <div id="chat-section">
                <div style="background:var(--tg-blue); color:white; padding:15px; font-weight:bold;">Chat Público</div>
                <div id="chat-box"></div>
                <div class="footer">
                    <button onclick="enviarMsg('foto')" style="background:none; border:none; font-size:24px;">📷</button>
                    <input id="msg-in" placeholder="Escribe..." onkeypress="if(event.key === 'Enter') enviarMsg('texto')">
                    <button onclick="enviarMsg('texto')" style="background:var(--tg-blue); border:none; color:white; width:40px; height:40px; border-radius:50%;">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    emailjs.init("BrWqcYWEajAbCMVYM");

    let dTemp = {}, codeReal = "", mUser = "", mPerf = { vip: false };

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- LÓGICA DE REGISTRO ---
    function enviarOTP() {
        const u = document.getElementById('reg-user').value.trim();
        const m = document.getElementById('reg-mail').value.trim();
        const p = document.getElementById('reg-pass').value.trim();
        if(!u || !m || !p) return alert("Llena todos los campos");

        codeReal = Math.floor(100000 + Math.random() * 900000).toString();
        dTemp = { user: u, mail: m, pass: p };
        emailjs.send("service_ahvtgiw", "template_jsynwd9", { to_name: u, to_email: m, code: codeReal })
        .then(() => view('scr-verify'));
    }

    function confirmarOTP() {
        if(document.getElementById('otp-input').value === codeReal) {
            mUser = dTemp.user.toLowerCase().replace(/\s/g, '');
            // Se guarda la clave para futuros inicios de sesión
            db.ref('usuarios/' + mUser).set({ nombre: dTemp.user, clave: dTemp.pass, vip: false })
            .then(() => entrar());
        } else { alert("Código incorrecto"); }
    }

    // --- LÓGICA DE LOGIN ---
    function login() {
        const u = document.getElementById('log-user').value.trim().toLowerCase().replace(/\s/g, '');
        const p = document.getElementById('log-pass').value.trim();
        
        db.ref('usuarios/' + u).once('value', s => {
            if(s.exists() && s.val().clave === p) {
                mUser = u;
                entrar();
            } else {
                alert("Usuario o clave incorrectos");
            }
        });
    }

    function entrar() {
        view('scr-chat');
        db.ref('usuarios/' + mUser).on('value', s => { if(s.exists()) mPerf = s.val(); });
        db.ref('Chat Público').on('value', s => {
            const b = document.getElementById('chat-box'); b.innerHTML = "";
            s.forEach(c => {
                const data = c.val();
                const d = document.createElement('div');
                d.className = "msg " + (data.u === mUser ? "me" : "them");
                d.innerHTML = `<b>${data.u}</b>${data.t}`;
                b.appendChild(d);
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function enviarMsg(t) {
        const i = document.getElementById('msg-in');
        if(t === "texto" && !i.value.trim()) return;
        db.ref('Chat Público').push({ u: mUser, t: t === "foto" ? "📷 Foto" : i.value, type: t });
        i.value = "";
    }
</script>
</body>
</html>
