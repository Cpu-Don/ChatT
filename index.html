<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincro MD - Pro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --msg-out: #efffde; --side-bg: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; width: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #0e1621; }
        
        #app { width: 100%; height: 100dvh; display: flex; flex-direction: column; background: white; position: relative; }

        /* NOTIFICACIONES */
        #toast-container { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 10000; width: 90%; max-width: 400px; pointer-events: none; }
        .toast { background: rgba(0,0,0,0.9); color: white; padding: 12px 20px; border-radius: 12px; margin-bottom: 8px; font-size: 14px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        /* LAYOUT */
        #main-layout { display: flex; width: 100%; height: 100%; overflow: hidden; position: relative; }
        aside { width: 280px; background: var(--side-bg); border-right: 1px solid #dfe5ec; display: flex; flex-direction: column; z-index: 50; transition: transform 0.3s ease; }
        #chat-section { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; height: 100%; min-width: 0; }

        /* BARRAS FIJAS */
        .header { height: 60px; min-height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #ddd; z-index: 10; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .footer { height: auto; min-height: 65px; background: white; padding: 10px; display: flex; align-items: center; gap: 8px; border-top: 1px solid #eee; z-index: 10; }

        /* MENSAJES */
        .msg { padding: 10px 14px; border-radius: 18px; max-width: 85%; background: white; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 4px; }
        .msg b { display: block; color: var(--tg-blue); font-size: 11px; margin-bottom: 2px; }

        /* MULTIMEDIA */
        .media-container { margin-top: 5px; border-radius: 10px; overflow: hidden; background: #000; position: relative; }
        .blur { filter: blur(40px); }
        .lock { position: absolute; inset: 0; background: rgba(0,0,0,0.5); color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }

        @media (max-width: 1023px) {
            aside { position: absolute; top: 0; height: 100%; width: 280px; }
            #sidebar-left { left: 0; transform: translateX(-100%); }
            #sidebar-right { right: 0; transform: translateX(100%); }
            .show-left { transform: translateX(0) !important; }
            .show-right { transform: translateX(0) !important; }
        }

        /* SCREENS */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; z-index: 100; position: absolute; top:0; left:0; }
        .active { display: flex; }
        .bg-blue { background: linear-gradient(135deg, #0088cc, #004466); color: white; }
        input { padding: 14px; width: 100%; max-width: 320px; margin-top: 10px; border-radius: 12px; border: none; font-size: 16px; outline: none; }
        .btn-action { padding: 14px; width: 100%; max-width: 320px; margin-top: 20px; border-radius: 12px; border: none; background: white; color: #0088cc; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="app">
    <div id="scr-login" class="screen bg-blue active">
        <h1>Sincro MD</h1>
        <input type="text" id="log-user" placeholder="Usuario">
        <input type="password" id="log-pass" placeholder="Contraseña">
        <button onclick="login()" class="btn-action">ENTRAR</button>
        <p onclick="view('scr-reg')" style="margin-top: 20px; font-size: 14px; cursor: pointer; text-decoration: underline;">Crear cuenta nueva</p>
    </div>

    <div id="scr-reg" class="screen bg-blue">
        <h1>Registro</h1>
        <input type="text" id="reg-user" placeholder="Nombre de Usuario">
        <input type="email" id="reg-mail" placeholder="Correo Gmail">
        <input type="password" id="reg-pass" placeholder="Contraseña">
        <button onclick="solicitarCodigo()" class="btn-action">RECIBIR CÓDIGO POR GMAIL</button>
        <p onclick="view('scr-login')" style="margin-top: 20px; font-size: 14px; cursor: pointer;">Volver</p>
    </div>

    <div id="scr-otp" class="screen bg-blue">
        <h1>Verificar Correo</h1>
        <p style="margin-bottom: 10px; font-size: 14px;">Escribe el código que enviamos a tu Gmail</p>
        <input type="number" id="otp-input" placeholder="Código de 6 dígitos" style="text-align: center; letter-spacing: 5px; font-size: 24px;">
        <button onclick="validarYCrear()" class="btn-action">VERIFICAR Y CREAR CUENTA</button>
    </div>

    <div id="scr-chat" class="screen" style="padding:0;">
        <div id="main-layout">
            <aside id="sidebar-left">
                <div class="header"><b>SINCRO</b> <button onclick="toggleMenu('left')">✕</button></div>
                <div onclick="verChatPublico()" style="padding:15px; background:#e1e9f2; border-left:5px solid #0088cc; cursor:pointer;">Público 🚀</div>
                <div id="private-list" style="flex:1; overflow-y:auto;"></div>
            </aside>

            <main id="chat-section">
                <div class="header">
                    <button onclick="toggleMenu('left')" style="border:none; background:none; font-size:24px;">☰</button>
                    <span id="chat-title" style="font-weight:bold;">Chat</span>
                    <button onclick="toggleMenu('right')" style="border:none; background:none; font-size:24px;">👤</button>
                </div>
                <div id="chat-box"></div>
                <div class="footer">
                    <button onclick="abrirCloudinary('foto')" style="border:none; background:none; font-size:28px;">🖼️</button>
                    <button onclick="abrirCloudinary('video')" style="border:none; background:none; font-size:28px;">📹</button>
                    <input id="msg-in" placeholder="Escribe..." onkeypress="if(event.key==='Enter') enviarMsg()">
                    <button onclick="enviarMsg()" style="background:#0088cc; color:white; border:none; width:45px; height:45px; border-radius:50%;">➤</button>
                </div>
            </main>

            <aside id="sidebar-right">
                <div class="header"><b>INFO</b> <button onclick="toggleMenu('right')">✕</button></div>
                <div id="gallery" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:5px; padding:10px;"></div>
                <div id="member-list" style="flex:1; overflow-y:auto;"></div>
            </aside>
        </div>
    </div>
</div>

<script>
    // --- TUS DATOS ---
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    emailjs.init("BrWqcYWEajAbCMVYM"); // Tu Public Key de EmailJS

    const CLOUD_NAME = "dhtyepcjg"; 
    const UPLOAD_PRESET = "Historial";

    let mUser = "", mPerf = { vip: false }, chatActual = "Chat Público";
    let otpGenerado = "", datosTemp = {};

    function notify(msg) {
        const container = document.getElementById('toast-container');
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = msg;
        container.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleMenu(side) {
        if(side === 'left') document.getElementById('sidebar-left').classList.toggle('show-left');
        if(side === 'right') document.getElementById('sidebar-right').classList.toggle('show-right');
    }

    // --- LÓGICA DE REGISTRO CON CÓDIGO ---
    function solicitarCodigo() {
        const u = document.getElementById('reg-user').value.trim().toLowerCase();
        const e = document.getElementById('reg-mail').value.trim();
        const p = document.getElementById('reg-pass').value;

        if(!u || !e || !p) return notify("⚠️ Rellena todos los campos");

        otpGenerado = Math.floor(100000 + Math.random() * 900000).toString();
        datosTemp = { u, e, p };

        notify("Enviando código a " + e + "...");

        emailjs.send("service_xsnvy9s", "template_a6962f9", {
            to_name: u,
            to_email: e,
            message: otpGenerado
        }).then(() => {
            notify("✅ Código enviado con éxito");
            view('scr-otp');
        }).catch(err => notify("❌ Error de envío"));
    }

    function validarYCrear() {
        const inputOTP = document.getElementById('otp-input').value;
        if(inputOTP === otpGenerado) {
            db.ref('usuarios/' + datosTemp.u).set({
                nombre: datosTemp.u,
                clave: datosTemp.p,
                correo: datosTemp.e,
                vip: (datosTemp.u === 'chat')
            }).then(() => {
                notify("🚀 ¡Cuenta creada con éxito!");
                view('scr-login');
            });
        } else {
            notify("❌ Código incorrecto");
        }
    }

    // --- RESTO DE FUNCIONES ---
    function login() {
        const u = document.getElementById('log-user').value.trim().toLowerCase();
        const p = document.getElementById('log-pass').value;
        db.ref('usuarios/' + u).once('value', s => {
            if(s.exists() && s.val().clave === p) {
                mUser = u; entrar(); notify("¡Hola, " + u + "!");
            } else notify("❌ Error en acceso");
        });
    }

    function entrar() {
        view('scr-chat');
        db.ref('usuarios/' + mUser).on('value', s => { if(s.exists()) mPerf = s.val(); });
        
        db.ref('usuarios').on('value', snap => {
            const list = document.getElementById('member-list'); list.innerHTML = "";
            snap.forEach(child => {
                if(child.key === mUser) return;
                list.innerHTML += `<div onclick="iniciarPrivado('${child.key}')" style="padding:12px; border-bottom:1px solid #eee; cursor:pointer;">👤 ${child.val().nombre}</div>`;
            });
        });
        verChatPublico();
    }

    function escucharChat() {
        db.ref(chatActual).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const isMine = data.u === mUser;
                const isAdmin = (mUser === 'chat');
                const d = document.createElement('div');
                d.className = "msg " + (isMine ? "me" : "them");
                
                let html = `<b>${data.u}</b>`;
                if(data.type === 'foto' || data.type === 'video') {
                    const locked = !mPerf.vip && !isMine && !isAdmin;
                    html += `<div class="media-container">${locked?'<div class="lock">🔒 VIP</div>':''}${data.type==='foto'?`<img src="${data.url}" class="${locked?'blur':''}" style="width:100%">`:`<video src="${data.url}" controls class="${locked?'blur':''}" style="width:100%"></video>`}</div>`;
                } else { html += `<span>${data.t}</span>`; }
                d.innerHTML = html; box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function abrirCloudinary(tipo) {
        cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET, sources: ['local', 'camera'] }, (err, res) => {
            if (!err && res && res.event === "success") {
                db.ref(chatActual).push({ u: mUser, url: res.info.secure_url, type: tipo });
            }
        });
    }

    function enviarMsg() {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        db.ref(chatActual).push({ u: mUser, t: i.value, type: 'texto' });
        i.value = "";
    }

    function iniciarPrivado(otro) {
        chatActual = "Privados/" + [mUser, otro].sort().join("_");
        document.getElementById('chat-title').innerText = "Privado: " + otro;
        escucharChat();
    }

    function verChatPublico() {
        chatActual = "Chat Público";
        document.getElementById('chat-title').innerText = "Chat Público";
        escucharChat();
    }
</script>
</body>
</html>
