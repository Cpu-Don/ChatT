<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincro MD - Edición Total</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --msg-out: #efffde; --side-bg: #ffffff; --sincro-purple: #6a1b9a; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0e1621; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #app { width: 100%; height: 100%; background: white; display: flex; overflow: hidden; position: relative; }
        @media (min-width: 1024px) { #app { width: 98%; height: 96vh; margin: 2vh auto; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); } }

        /* Notificaciones */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: #333; color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; margin-bottom: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-left: 5px solid var(--tg-blue); animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Estructura Principal */
        #sidebar-left, #sidebar-right { width: 300px; background: var(--side-bg); border: 1px solid #dfe5ec; display: flex; flex-direction: column; z-index: 10; overflow: hidden; flex-shrink: 0; }
        .collapsed-left { width: 0 !important; border: none !important; }
        .collapsed-right { width: 0 !important; border: none !important; }
        
        #chat-section { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; min-width: 0; height: 100%; }

        @media (max-width: 1023px) {
            #sidebar-left { position: absolute; left: 0; transform: translateX(-100%); height: 100%; width: 85%; }
            #sidebar-right { position: absolute; right: 0; transform: translateX(100%); height: 100%; width: 85%; }
            .show-left { transform: translateX(0) !important; }
            .show-right { transform: translateX(0) !important; }
        }

        .header { height: 60px; padding: 0 15px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; flex-shrink: 0; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); }
        
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; background: white; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); position: relative; word-wrap: break-word; }
        .me { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; }
        .them { align-self: flex-start; background: #ffffff; border-bottom-left-radius: 2px; }
        .msg b { display: block; color: var(--tg-blue); font-size: 11px; margin-bottom: 4px; cursor: pointer; }

        /* Media */
        .media-container { margin-top: 5px; border-radius: 10px; overflow: hidden; background: #000; cursor: pointer; display: flex; justify-content: center; position: relative; }
        .media-container img, .media-container video { max-width: 100%; max-height: 300px; display: block; }
        .blur { filter: blur(35px); opacity: 0.4; pointer-events: none; }
        .lock-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; z-index: 5; text-align: center; }

        footer { padding: 10px; background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        #msg-in { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }

        /* Pantallas */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }
        .bg-blue { background: linear-gradient(135deg, #0088cc, #004466); color: white; }
        .in-style { padding:14px; width:85%; max-width: 320px; margin-top:10px; border-radius:10px; border:none; }
        .btn-main { padding:14px; width:85%; max-width: 320px; margin-top:20px; border-radius:10px; border:none; background: white; color:#0088cc; font-weight:bold; cursor:pointer; }
        
        /* Modales Admin */
        .admin-modal { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); background:white; width:90%; max-width:400px; height:70vh; z-index:5000; border-radius:20px; box-shadow:0 0 50px rgba(0,0,0,0.5); flex-direction:column; overflow:hidden; }
        .list-item { padding:15px; border-bottom:1px solid #eee; font-size:12px; position: relative; }

        /* Baneo Screen */
        .scr-banned { background: #1a1a1a; color: white; }
        .ban-box { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 350px; width: 90%; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="scr-banned" class="screen scr-banned">
    <div class="ban-box">
        <h1 style="color: #d9534f; margin: 0;">CUENTA SUSPENDIDA</h1>
        <p style="color: #666; font-size: 14px;">Se ha detectado una infracción en tu cuenta.</p>
        <div style="background: #fff5f5; padding: 15px; border-radius: 10px; text-align: left; border-left: 4px solid #d9534f; margin: 15px 0;">
            <b style="font-size: 10px; color: #d9534f;">MOTIVO:</b><br>
            <span id="ban-reason-text" style="font-size: 14px;"></span>
        </div>
        <button onclick="location.reload()" class="btn-main" style="background:#d9534f; color:white; width:100%;">REINTENTAR ACCESO</button>
    </div>
</div>

<div id="admin-reports-panel" class="admin-modal">
    <div style="background:var(--sincro-purple); color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between;">
        REPORTES RECIBIDOS <span onclick="cerrarModales()" style="cursor:pointer;">×</span>
    </div>
    <div id="listado-reportes" style="flex:1; overflow-y:auto; padding:10px;"></div>
    <button onclick="vaciarReportes()" style="padding:10px; color:red; border:none; background:none; cursor:pointer;">Borrar todos los reportes</button>
</div>

<div id="admin-ban-list-panel" class="admin-modal">
    <div style="background:#333; color:white; padding:15px; font-weight:bold; display:flex; justify-content:space-between;">
        LISTA DE BANEADOS <span onclick="cerrarModales()" style="cursor:pointer;">×</span>
    </div>
    <div id="listado-baneados" style="flex:1; overflow-y:auto; padding:10px;"></div>
</div>

<div id="media-viewer" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:6000; flex-direction:column; align-items:center; justify-content:center;">
    <button onclick="cerrarMedia()" style="position:absolute; top:20px; right:20px; color:white; font-size:30px; background:none; border:none;">×</button>
    <div id="viewer-main-container"></div>
</div>

<div id="app">
    <div id="scr-login" class="screen bg-blue active">
        <h1 style="font-size: 40px; margin:0;">Sincro MD</h1>
        <p style="opacity:0.7;">Conexión Segura</p>
        <input type="email" id="log-mail" class="in-style" placeholder="Correo">
        <input type="password" id="log-pass" class="in-style" placeholder="Contraseña">
        <button onclick="login()" class="btn-main">ENTRAR</button>
        <p onclick="view('scr-reg')" style="cursor:pointer; font-size:13px; margin-top:15px;">Crear cuenta nueva</p>
    </div>

    <div id="scr-reg" class="screen bg-blue">
        <h1>Registro</h1>
        <input type="text" id="reg-user" class="in-style" placeholder="Nombre de Usuario">
        <input type="email" id="reg-mail" class="in-style" placeholder="Correo">
        <input type="password" id="reg-pass" class="in-style" placeholder="Mínimo 6 caracteres">
        <button onclick="registro()" class="btn-main">REGISTRARME</button>
        <p onclick="view('scr-login')" style="cursor:pointer; margin-top:15px;">Ya tengo cuenta</p>
    </div>

    <div id="scr-chat" class="screen" style="flex-direction:row; padding:0;">
        <aside id="sidebar-left">
            <div style="padding:15px; background:var(--tg-blue); color:white; font-weight:bold; display:flex; justify-content:space-between;">
                MENU <span onclick="toggleMenu('left')" style="cursor:pointer;">☰</span>
            </div>
            <div id="vip-status-container" style="padding:10px; border-bottom:1px solid #eee;">
                <button id="btn-pedir-vip-fijo" onclick="enviarSolicitudVip()" style="width:100%; padding:8px; background:var(--tg-blue); color:white; border:none; border-radius:5px; cursor:pointer;">⭐ Obtener VIP</button>
            </div>
            <div onclick="verChatPublico()" style="padding:15px; background:#f0f4f8; cursor:pointer; font-weight:bold;">🌐 Chat Público</div>
            <div style="padding:10px; font-size:11px; color:#888; background:#fafafa;">MIEMBROS</div>
            <div id="miembros-list" style="flex:1; overflow-y:auto;"></div>
            <button onclick="logout()" style="padding:15px; border:none; color:red; cursor:pointer;">Cerrar Sesión</button>
        </aside>

        <main id="chat-section">
            <header class="header">
               <button onclick="toggleMenu('left')" style="border:none; background:none; font-size:20px;">☰</button>
               <div style="text-align:center;">
                   <b id="chat-title">Sincro Chat</b><br>
                   <small id="chat-status" style="color:#888; font-size:10px;"></small>
               </div>
               <button onclick="toggleMenu('right')" style="border:none; background:none; font-size:20px;">👤</button>
            </header>
            <div id="chat-box"></div>
            <footer>
               <button onclick="abrirCloudinary()" style="border:none; background:none; font-size:20px;">📷</button>
               <input id="msg-in" placeholder="Escribe algo...">
               <button onclick="enviarMsg()" style="background:var(--tg-blue); color:white; border:none; width:40px; height:40px; border-radius:50%;">➤</button>
            </footer>
        </main>

        <aside id="sidebar-right">
            <div style="padding:15px; border-bottom:1px solid #eee; font-weight:bold; color:var(--tg-blue);">Información</div>
            <div style="padding:20px; text-align:center;">
                <div style="width:70px; height:70px; background:var(--tg-blue); border-radius:50%; margin: 0 auto 10px; display:flex; align-items:center; justify-content:center; color:white; font-size:30px;">S</div>
                <h4 id="info-name" style="margin:0;">Sincro MD</h4>
                
                <div id="admin-tools" style="display:none; margin-top:15px;">
                    <button onclick="abrirReportes()" style="width:100%; padding:8px; background:var(--sincro-purple); color:white; border:none; border-radius:5px; margin-bottom:5px; cursor:pointer; font-size:11px;">⚠️ REPORTES</button>
                    <button onclick="abrirListaBaneados()" style="width:100%; padding:8px; background:#333; color:white; border:none; border-radius:5px; cursor:pointer; font-size:11px;">🚫 LISTA NEGRA</button>
                </div>
            </div>

            <div style="padding:15px; background:#f9f9f9; border-radius:10px; margin:10px;">
                <b style="font-size:12px; color:var(--sincro-purple);">REPORTE RÁPIDO</b>
                <input type="text" id="rep-target" placeholder="Usuario..." style="width:100%; margin-top:5px; padding:5px; font-size:12px;">
                <textarea id="rep-reason" placeholder="Motivo..." style="width:100%; margin-top:5px; padding:5px; font-size:12px;"></textarea>
                <button onclick="enviarReporte()" style="width:100%; margin-top:5px; background:var(--sincro-purple); color:white; border:none; padding:8px; border-radius:5px; cursor:pointer; font-size:11px;">ENVIAR REPORTE</button>
            </div>

            <div style="padding:10px; font-size:11px; font-weight:bold; color:#888;">GALERÍA</div>
            <div id="gallery" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:2px; padding:5px; overflow-y:auto;"></div>
        </aside>
    </div>
</div>

<script>
    // CONFIGURACIÓN FIREBASE
    const firebaseConfig = { 
        databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/",
        apiKey: "AIzaSyB2GH_bFRmRwhqtaBb3ll_9eNEMXj7RuMo" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    const CLOUD_NAME = "dhtyepcjg", UPLOAD_PRESET = "Historial";

    let mUser = null, mData = {}, chatActual = "Sincro_Chat_Publico", listener = null;

    // --- SISTEMA DE GESTIÓN DE BANEOS ---

    function ejecutarBaneo(nombreUsuario) {
        const tiempo = prompt("DURACIÓN:\n1 = 1 Hora\n2 = 5 Días\n3 = 1 Año\n4 = Permanente", "1");
        if(!tiempo) return;
        const motivo = prompt("Motivo del baneo para " + nombreUsuario + ":");
        if(!motivo) return;

        let ms = 0; const ahora = Date.now();
        if (tiempo === "1") ms = ahora + 3600000;
        else if (tiempo === "2") ms = ahora + 432000000;
        else if (tiempo === "3") ms = ahora + 31536000000;
        else ms = 9999999999999;

        db.ref('Sincro_Usuarios').once('value', snap => {
            snap.forEach(child => {
                if(child.val().nombre === nombreUsuario) {
                    db.ref('Sincro_Usuarios/' + child.key).update({ banned: true, banReason: motivo, banUntil: ms })
                    .then(() => notify("🔨 Usuario baneado con éxito."));
                }
            });
        });
    }

    function ejecutarDesbaneo(uid) {
        if(confirm("¿Deseas quitar el baneo a este usuario?")) {
            db.ref('Sincro_Usuarios/' + uid).update({ banned: false, banUntil: 0, banReason: "" })
            .then(() => { notify("✅ Usuario desbloqueado"); abrirListaBaneados(); });
        }
    }

    function abrirListaBaneados() {
        cerrarModales();
        const panel = document.getElementById('admin-ban-list-panel');
        panel.style.display = 'flex';
        const listado = document.getElementById('listado-baneados');
        listado.innerHTML = "<p style='text-align:center; color:#888;'>Cargando lista...</p>";

        db.ref('Sincro_Usuarios').once('value', snap => {
            listado.innerHTML = "";
            let hayBaneados = false;
            snap.forEach(child => {
                const u = child.val();
                if(u.banned) {
                    hayBaneados = true;
                    listado.innerHTML += `
                    <div class="list-item">
                        <b>${u.nombre}</b><br>
                        <small>Motivo: ${u.banReason}</small><br>
                        <small style="color:red;">Hasta: ${new Date(u.banUntil).toLocaleString()}</small>
                        <button onclick="ejecutarDesbaneo('${child.key}')" style="position:absolute; right:10px; top:15px; padding:5px; background:#4caf50; color:white; border:none; border-radius:5px; cursor:pointer;">DESBANEAR</button>
                    </div>`;
                }
            });
            if(!hayBaneados) listado.innerHTML = "<p style='text-align:center; padding:20px;'>No hay usuarios baneados.</p>";
        });
    }

    // --- REPORTES ---
    function enviarReporte() {
        const t = document.getElementById('rep-target').value.trim(), r = document.getElementById('rep-reason').value.trim();
        if(!t || !r) return notify("⚠️ Completa los datos");
        db.ref('Sincro_Reportes').push({ reportado: t, motivo: r, por: mData.nombre, fecha: new Date().toLocaleString() })
        .then(() => { notify("✅ Reporte enviado"); document.getElementById('rep-target').value = ""; document.getElementById('rep-reason').value = ""; });
    }

    function abrirReportes() {
        cerrarModales();
        document.getElementById('admin-reports-panel').style.display = 'flex';
        db.ref('Sincro_Reportes').on('value', snap => {
            const list = document.getElementById('listado-reportes'); list.innerHTML = "";
            if(!snap.exists()) { list.innerHTML = "<p style='padding:20px; color:#888;'>Sin reportes.</p>"; return; }
            snap.forEach(c => {
                const rep = c.val();
                list.innerHTML += `<div class="list-item"><b>${rep.reportado}</b>: ${rep.motivo}<br><small>Por: ${rep.por}</small>
                <button onclick="ejecutarBaneo('${rep.reportado}')" style="position:absolute; right:10px; top:15px; background:red; color:white; border:none; padding:5px; border-radius:5px;">BAN</button></div>`;
            });
        });
    }

    function vaciarReportes() { if(confirm("¿Vaciar historial?")) db.ref('Sincro_Reportes').remove(); }
    function cerrarModales() { 
        document.getElementById('admin-reports-panel').style.display = 'none'; 
        document.getElementById('admin-ban-list-panel').style.display = 'none'; 
        db.ref('Sincro_Reportes').off(); 
    }

    // --- NÚCLEO DE SEGURIDAD Y ESTADO ---
    auth.onAuthStateChanged(user => {
        if (user) {
            if (!user.emailVerified) { 
                if (!document.getElementById('scr-reg').classList.contains('active')) { auth.signOut(); view('scr-login'); }
                return; 
            }
            mUser = user;
            db.ref('Sincro_Usuarios/' + user.uid).on('value', snap => {
                mData = snap.val();
                if(mData) {
                    const ahora = Date.now();
                    // LÓGICA DE BANEO CORREGIDA
                    if(mData.banned && mData.banUntil > ahora) {
                        document.getElementById('ban-reason-text').innerHTML = `${mData.banReason} <br><br> <small style="color:#d9534f; font-weight:bold;">Libre el: ${new Date(mData.banUntil).toLocaleString()}</small>`;
                        view('scr-banned'); 
                        auth.signOut(); // Cerramos sesión para que no pueda interactuar, pero la pantalla se queda
                    } else if (mData.banned && mData.banUntil <= ahora) {
                        db.ref('Sincro_Usuarios/' + user.uid).update({ banned: false, banUntil: 0 });
                        iniciarApp();
                    } else {
                        iniciarApp();
                    }
                }
            });
            db.ref('Sincro_Usuarios/' + user.uid + '/online').set(true);
            db.ref('Sincro_Usuarios/' + user.uid + '/online').onDisconnect().set(false);
        } else {
            // Solo mandamos al login si NO estamos en registro ni en la pantalla de baneo
            const enRegistro = document.getElementById('scr-reg').classList.contains('active');
            const enBaneo = document.getElementById('scr-banned').classList.contains('active');
            if (!enRegistro && !enBaneo) view('scr-login');
        }
    });

    function iniciarApp() {
        view('scr-chat');
        const soyAdmin = mData.nombre && mData.nombre.toLowerCase() === 'chat';
        if(soyAdmin) {
            mData.vip = true;
            document.getElementById('admin-tools').style.display = 'block';
        }
        
        // Listado de usuarios
        db.ref('Sincro_Usuarios').on('value', snap => {
            const list = document.getElementById('miembros-list'); list.innerHTML = "";
            snap.forEach(c => {
                const u = c.val(); if(c.key === mUser.uid || u.banned) return;
                list.innerHTML += `<div onclick="iniciarPrivado('${c.key}', '${u.nombre}')" style="padding:10px; border-bottom:1px solid #f2f2f2; cursor:pointer;"><b>${u.nombre}</b> ${u.vip?'⭐':''}</div>`;
            });
        });
        if(!listener) verChatPublico();
    }

    // --- FUNCIONES DE CHAT Y MEDIA ---
    function view(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    function notify(t) { 
        const c = document.getElementById('toast-container'); const e = document.createElement('div'); 
        e.className = 'toast'; e.innerText = t; c.appendChild(e); setTimeout(() => e.remove(), 3000); 
    }

    function toggleMenu(side) {
        const el = document.getElementById('sidebar-' + side);
        if(window.innerWidth >= 1024) el.classList.toggle('collapsed-' + side);
        else el.classList.toggle('show-' + side);
    }

    function verChatPublico() { chatActual = "Sincro_Chat_Publico"; document.getElementById('chat-status').innerText = "Global"; escucharChat(); }

    function iniciarPrivado(uid, nombre) {
        chatActual = "Sincro_Privados/" + [mUser.uid, uid].sort().join("_");
        document.getElementById('chat-title').innerText = nombre; document.getElementById('chat-status').innerText = "Privado";
        escucharChat(); if(window.innerWidth < 1024) toggleMenu('left');
    }

    function escucharChat() {
        const box = document.getElementById('chat-box'), gal = document.getElementById('gallery');
        box.innerHTML = ""; gal.innerHTML = "";
        if(listener) db.ref(chatActual).off();
        listener = db.ref(chatActual).on('child_added', snap => {
            const d = snap.val(), isMine = d.uid === mUser.uid;
            const el = document.createElement('div'); el.className = "msg " + (isMine?"me":"them");
            let html = `<b>${d.user}</b>`;
            if(d.type === 'foto' || d.type === 'video') {
                const lock = !mData.vip && !isMine;
                const media = d.type==='video' ? `<video src="${d.url}" style="width:100%"></video>` : `<img src="${d.url}" style="width:100%">`;
                html += `<div class="media-container ${lock?'blur':''}" onclick="abrirMedia('${d.url}','${d.type}')">${lock?'<div class="lock-overlay">🔒 VIP</div>':''}${media}</div>`;
                const gI = document.createElement('div'); gI.innerHTML = media; gI.style = "height:60px; background:#000; overflow:hidden;";
                gI.onclick = () => abrirMedia(d.url, d.type); gal.prepend(gI);
            } else { html += `<span>${d.msg}</span>`; }
            el.innerHTML = html; box.appendChild(el); box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg() {
        const i = document.getElementById('msg-in'); if(!i.value.trim()) return;
        db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, msg: i.value, type: 'texto', time: Date.now() });
        i.value = "";
    }

    function abrirCloudinary() {
        cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET }, (err, res) => {
            if(!err && res.event === "success") {
                const tipo = res.info.resource_type === 'video' ? 'video' : 'foto';
                db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, url: res.info.secure_url, type: tipo, time: Date.now() });
            }
        });
    }

    function abrirMedia(url, tipo) {
        if(!mData.vip) return notify("🔒 Contenido solo para VIP");
        const c = document.getElementById('viewer-main-container');
        c.innerHTML = tipo==='video' ? `<video src="${url}" controls autoplay style="max-width:90vw;"></video>` : `<img src="${url}" style="max-width:90vw;">`;
        document.getElementById('media-viewer').style.display = 'flex';
    }
    function cerrarMedia() { document.getElementById('media-viewer').style.display = 'none'; }

    function registro() {
        const u = document.getElementById('reg-user').value, e = document.getElementById('reg-mail').value, p = document.getElementById('reg-pass').value;
        auth.createUserWithEmailAndPassword(e,p).then(res => {
            res.user.sendEmailVerification();
            db.ref('Sincro_Usuarios/'+res.user.uid).set({ nombre: u, vip: u.toLowerCase()==='chat', banned: false });
            auth.signOut(); view('scr-login'); notify("📧 Verifica tu correo");
        }).catch(err => notify("❌ " + err.message));
    }

    function login() {
        const e = document.getElementById('log-mail').value, p = document.getElementById('log-pass').value;
        auth.signInWithEmailAndPassword(e,p).catch(err => notify("❌ " + err.message));
    }

    function logout() { db.ref('Sincro_Usuarios/'+mUser.uid+'/online').set(false); auth.signOut().then(()=>location.reload()); }
    function enviarSolicitudVip() { db.ref('Sincro_Usuarios/'+mUser.uid).update({ solicitudVip: 'pendiente' }); notify("🚀 Solicitud VIP enviada"); }

</script>
</body>
</html>
