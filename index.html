<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincro MD</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --side-bg: #ffffff; }
        * { box-sizing: border-box; transition: all 0.2s ease; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0e1621; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #app { width: 100%; height: 100%; background: white; display: flex; overflow: hidden; position: relative; }
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: #333; color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; margin-bottom: 8px; border-left: 5px solid #0088cc; }

        #sidebar-left, #sidebar-right { width: 300px; background: var(--side-bg); border: 1px solid #dfe5ec; display: flex; flex-direction: column; z-index: 10; overflow: hidden; flex-shrink: 0; }
        #chat-section { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; min-width: 0; height: 100%; }

        @media (max-width: 1023px) {
            #sidebar-left { position: absolute; left: 0; transform: translateX(-100%); height: 100%; width: 85%; }
            #sidebar-right { position: absolute; right: 0; transform: translateX(100%); height: 100%; width: 85%; }
            .show-left { transform: translateX(0) !important; }
            .show-right { transform: translateX(0) !important; }
        }

        .header { height: 65px; padding: 0 15px; background: white; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        
        /* Estilos VIP */
        .btn-solicitud { background: #0088cc; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; width: 100%; }
        .pendiente { background: #ff9800 !important; cursor: default; }
        .btn-admin-accept { background: #4caf50; color: white; border: none; border-radius: 4px; font-size: 9px; padding: 3px 6px; margin-left: 5px; cursor: pointer; }

        footer { padding: 10px; background: white; display: flex; gap: 10px; align-items: center; border-top: 1px solid #ddd; }
        #msg-in { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; }
        .active { display: flex; }
        .bg-blue { background: linear-gradient(135deg, #0088cc, #004466); color: white; }
        .in-style { padding:14px; width:85%; max-width: 320px; margin-top:10px; border-radius:10px; border:none; }
        .btn-main { padding:14px; width:85%; max-width: 320px; margin-top:20px; border-radius:10px; border:none; background: white; color:#0088cc; font-weight:bold; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="app">
    <div id="scr-login" class="screen bg-blue active">
        <h1>Sincro MD</h1>
        <input type="email" id="log-mail" class="in-style" placeholder="Correo">
        <input type="password" id="log-pass" class="in-style" placeholder="Contraseña">
        <button onclick="login()" class="btn-main">ENTRAR</button>
        <p onclick="view('scr-reg')" style="cursor:pointer; margin-top:20px;">Registrar cuenta</p>
    </div>

    <div id="scr-reg" class="screen bg-blue">
        <h1>Registro</h1>
        <input type="text" id="reg-user" class="in-style" placeholder="Nombre de Usuario">
        <input type="email" id="reg-mail" class="in-style" placeholder="Correo">
        <input type="password" id="reg-pass" class="in-style" placeholder="Clave (6+)">
        <button onclick="registro()" class="btn-main">CREAR CUENTA</button>
        <p onclick="view('scr-login')" style="cursor:pointer; margin-top:20px;">Ya tengo cuenta</p>
    </div>

    <div id="scr-chat" class="screen" style="flex-direction: row; padding: 0;">
        <aside id="sidebar-left">
            <div style="padding:15px; background:#0088cc; color:white; font-weight:bold; display:flex; justify-content:space-between; align-items:center;">
                SINCRO <span onclick="toggleMenu('left')" style="cursor:pointer;">☰</span>
            </div>

            <div id="vip-status-container" style="padding:10px 15px; border-bottom:1px solid #eee; display:none;">
                <button id="btn-pedir-vip-fijo" onclick="enviarSolicitudVip()" class="btn-solicitud">
                    ⭐ Solicitar Acceso VIP
                </button>
            </div>

            <div onclick="verChatPublico()" style="padding:15px; background:#e1e9f2; cursor:pointer; border-bottom:1px solid #ddd;">
                <b>Chat Público 🌐</b>
            </div>
            <div id="miembros-list" style="overflow-y:auto; flex:1;"></div>
            <button onclick="logout()" style="padding:15px; width:100%; border:none; color:red; cursor:pointer;">Cerrar Sesión</button>
        </aside>

        <main id="chat-section">
            <header class="header">
               <button onclick="toggleMenu('left')" style="border:none; background:none; font-size:24px;">☰</button>
               <div style="text-align:center;">
                   <b id="chat-title">Sincro MD</b><br>
                   <small id="chat-desc" style="font-size:10px; color:#888; display:block; margin-top:-2px;"></small>
               </div>
               <button onclick="toggleMenu('right')" style="border:none; background:none; font-size:24px;">👤</button>
            </header>
            <div id="chat-box"></div>
            <footer>
               <button onclick="abrirCloudinary()" style="border:none; background:none; font-size:26px;">📷</button>
               <input id="msg-in" placeholder="Escribe un mensaje...">
               <button onclick="enviarMsg()" style="background:#0088cc; color:white; border:none; width:40px; height:40px; border-radius:50%;">➤</button>
            </footer>
        </main>

        <aside id="sidebar-right">
            <div style="padding:15px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">
                <b>Info del Grupo</b>
                <span onclick="toggleMenu('right')" style="cursor:pointer;">✖</span>
            </div>
            <div style="padding:20px; text-align:center;">
                <h3 id="info-name">Sincro MD</h3>
                <button id="btn-edit-group" onclick="editarGrupo()" style="display:none; background:none; border:1px solid #0088cc; color:#0088cc; border-radius:5px; padding:5px; font-size:10px; cursor:pointer;">Editar Info</button>
            </div>
        </aside>
    </div>
</div>

<script>
    const firebaseConfig = { 
        databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/",
        apiKey: "AIzaSyB2GH_bFRmRwhqtaBb3ll_9eNEMXj7RuMo" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();

    let mUser = null, mData = {}, chatActual = "Sincro_Chat_Publico";

    function notify(t) {
        const c = document.getElementById('toast-container');
        const e = document.createElement('div'); e.className = 'toast'; e.innerText = t;
        c.appendChild(e); setTimeout(() => e.remove(), 4000);
    }

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleMenu(side) {
        document.getElementById('sidebar-' + side).classList.toggle(window.innerWidth >= 1024 ? 'collapsed-' + side : 'show-' + side);
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            mUser = user;
            db.ref('Sincro_Usuarios/' + user.uid).on('value', snap => {
                mData = snap.val() || {};
                iniciarApp();
            });
        } else { view('scr-login'); }
    });

    function iniciarApp() {
        view('scr-chat');
        const soyAdmin = mData.nombre && mData.nombre.toLowerCase() === 'chat';

        // MOSTRAR/OCULTAR BOTÓN VIP SEGÚN ESTADO
        const vipCont = document.getElementById('vip-status-container');
        if(vipCont) {
            if(!mData.vip && mData.solicitudVip !== 'pendiente') {
                vipCont.style.display = 'block';
            } else if(mData.solicitudVip === 'pendiente') {
                vipCont.style.display = 'block';
                const btn = document.getElementById('btn-pedir-vip-fijo');
                btn.innerText = "⏳ Solicitud Enviada";
                btn.classList.add('pendiente');
                btn.onclick = null;
            } else { vipCont.style.display = 'none'; }
        }

        if(soyAdmin) document.getElementById('btn-edit-group').style.display = 'inline-block';

        // CARGAR NOMBRE Y DESCRIPCIÓN DEL GRUPO
        db.ref('Sincro_Config').on('value', snap => {
            const config = snap.val() || {};
            document.getElementById('chat-title').innerText = config.nombreGrupo || "Sincro MD";
            document.getElementById('chat-desc').innerText = config.descripcionGrupo || "";
        });
    }

    function enviarSolicitudVip() {
        db.ref('Sincro_Usuarios/' + mUser.uid).update({ solicitudVip: 'pendiente' })
        .then(() => notify("🚀 Solicitud enviada al Admin"));
    }

    function editarGrupo() {
        const nuevoNombre = prompt("Nuevo nombre del grupo:", document.getElementById('chat-title').innerText);
        const nuevaDesc = prompt("Nueva descripción corta:", document.getElementById('chat-desc').innerText);
        if(nuevoNombre !== null) {
            db.ref('Sincro_Config').update({ 
                nombreGrupo: nuevoNombre, 
                descripcionGrupo: nuevaDesc || "" 
            });
        }
    }

    // Funciones básicas (Login, Logout, Registro)
    function login() {
        auth.signInWithEmailAndPassword(document.getElementById('log-mail').value, document.getElementById('log-pass').value)
        .catch(err => notify("❌ " + err.message));
    }
    function logout() { auth.signOut().then(() => location.reload()); }
    function registro() {
        const u = document.getElementById('reg-user').value, e = document.getElementById('reg-mail').value, p = document.getElementById('reg-pass').value;
        auth.createUserWithEmailAndPassword(e, p).then(res => {
            db.ref('Sincro_Usuarios/' + res.user.uid).set({ nombre: u, vip: (u.toLowerCase()==='chat'), solicitudVip: 'ninguna' });
            notify("✅ Cuenta creada");
        });
    }
</script>
</body>
</html>
