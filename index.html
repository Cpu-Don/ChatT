<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincro MD - Oficial</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --msg-out: #efffde; --side-bg: #ffffff; }
        * { box-sizing: border-box; transition: all 0.2s ease; margin: 0; padding: 0; }
        
        /* Ajuste de pantalla para que nada desaparezca */
        body, html { 
            height: 100%; width: 100%; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
            background: #0e1621; 
        }
        
        #app { 
            width: 100%; height: 100dvh; 
            background: white; display: flex; 
            flex-direction: column; overflow: hidden; position: relative; 
        }

        @media (min-width: 1024px) { 
            #app { width: 98%; height: 95vh; border-radius: 15px; margin: auto; } 
        }

        /* Notificaciones */
        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; width: 90%; max-width: 400px; }
        .toast { background: rgba(0, 0, 0, 0.85); color: white; padding: 12px 25px; border-radius: 50px; font-size: 14px; margin-bottom: 10px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideIn 0.4s forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

        /* Estructura de Chat */
        #main-layout { display: flex; width: 100%; flex: 1; overflow: hidden; position: relative; }
        #sidebar-left { width: 300px; background: var(--side-bg); border-right: 1px solid #dfe5ec; display: flex; flex-direction: column; z-index: 10; }
        #chat-section { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; min-width: 0; }
        #sidebar-right { width: 320px; background: var(--side-bg); border-left: 1px solid #dfe5ec; display: flex; flex-direction: column; z-index: 10; }

        @media (max-width: 1023px) {
            #sidebar-left, #sidebar-right { position: absolute; height: 100%; width: 80%; transition: 0.3s; }
            #sidebar-left { left: 0; transform: translateX(-100%); }
            #sidebar-right { right: 0; transform: translateX(100%); }
            .show-left { transform: translateX(0) !important; }
            .show-right { transform: translateX(0) !important; }
        }

        /* BARRAS FIJAS (Header y Footer) */
        .header { height: 60px; min-height: 60px; padding: 0 15px; background: white; font-weight: bold; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; z-index: 5; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; background: var(--tg-bg); }
        .footer { height: auto; min-height: 70px; padding: 10px; background: white; display: flex; gap: 10px; border-top: 1px solid #eee; align-items: center; z-index: 5; }

        /* Mensajes */
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 85%; background: white; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me { align-self: flex-end; background: var(--msg-out); border-bottom-right-radius: 2px; }
        .msg b { display: block; color: var(--tg-blue); font-size: 11px; margin-bottom: 3px; }

        /* Login y Pantallas */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; padding: 20px; position: absolute; top:0; left:0; }
        .active { display: flex; }
        .bg-blue { background: linear-gradient(135deg, #0088cc, #004466); color: white; }
        .in-style { padding:14px; width:100%; max-width: 320px; margin-top:12px; border-radius:10px; border:none; outline:none; font-size: 16px; }
        .btn-main { padding:14px; width:100%; max-width: 320px; margin-top:25px; border-radius:10px; border:none; background: white; color:#0088cc; font-weight:bold; cursor:pointer; font-size: 16px; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="app">
    <div id="scr-login" class="screen bg-blue active">
        <h1>Sincro MD</h1>
        <input type="text" id="log-user" class="in-style" placeholder="Usuario">
        <input type="password" id="log-pass" class="in-style" placeholder="Contraseña">
        <button onclick="login()" class="btn-main">ENTRAR</button>
        <p onclick="view('scr-reg')" style="cursor:pointer; font-size:14px; margin-top:20px; text-decoration: underline;">Crear cuenta nueva</p>
    </div>

    <div id="scr-reg" class="screen bg-blue">
        <h1>Registro</h1>
        <input type="text" id="reg-user" class="in-style" placeholder="Usuario">
        <input type="email" id="reg-mail" class="in-style" placeholder="Correo Gmail">
        <input type="password" id="reg-pass" class="in-style" placeholder="Contraseña">
        <button onclick="solicitarCodigo()" class="btn-main">ENVIAR CÓDIGO A GMAIL</button>
        <p onclick="view('scr-login')" style="cursor:pointer; font-size:14px; margin-top:20px;">Ya tengo cuenta</p>
    </div>

    <div id="scr-otp" class="screen bg-blue">
        <h1>Verifica tu Email</h1>
        <p style="margin-bottom: 15px;">Introduce el código enviado:</p>
        <input type="number" id="otp-input" class="in-style" placeholder="Código de 6 dígitos" style="text-align: center; letter-spacing: 5px;">
        <button onclick="verificarYCrear()" class="btn-main">VERIFICAR Y CREAR</button>
    </div>

    <div id="scr-chat" class="screen" style="padding:0;">
        <div id="main-layout">
            <aside id="sidebar-left">
                <div class="header">SINCRO <button onclick="toggleMenu('left')" style="border:none; background:none; font-size:18px;">✕</button></div>
                <div onclick="verChatPublico()" style="padding:18px; background:#e1e9f2; border-left:5px solid #0088cc; cursor:pointer; font-weight:bold;">Chat Público 🚀</div>
                <div id="private-list" style="overflow-y:auto; flex:1;"></div>
            </aside>

            <main id="chat-section">
                <div class="header">
                    <button onclick="toggleMenu('left')" style="border:none; background:none; font-size:24px;">☰</button>
                    <span id="chat-title">Chat Público</span>
                    <button onclick="toggleMenu('right')" style="border:none; background:none; font-size:24px;">👤</button>
                </div>
                
                <div id="chat-box"></div>
                
                <div class="footer">
                    <button onclick="abrirCloudinary('foto')" style="border:none; background:none; font-size:28px;">🖼️</button>
                    <button onclick="abrirCloudinary('video')" style="border:none; background:none; font-size:28px;">📹</button>
                    <input id="msg-in" placeholder="Escribe..." style="flex:1; padding:14px; border-radius:30px; border:1px solid #eee; outline:none;" onkeypress="if(event.key === 'Enter') enviarMsg()">
                    <button onclick="enviarMsg()" style="background:#0088cc; color:white; border:none; width:48px; height:48px; border-radius:50%;">➤</button>
                </div>
            </main>

            <aside id="sidebar-right">
                <div class="header">INFO <button onclick="toggleMenu('right')" style="border:none; background:none; font-size:18px;">✕</button></div>
                <div id="gallery" class="media-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px;"></div>
                <div id="member-list" style="flex:1; overflow-y:auto;"></div>
            </aside>
        </div>
    </div>
</div>

<script>
    // --- DATOS ---
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    emailjs.init("BrWqcYWEajAbCMVYM"); // Tu Public Key

    const CLOUD_NAME = "dhtyepcjg"; 
    const UPLOAD_PRESET = "Historial";

    let mUser = "", mPerf = { vip: false }, chatActual = "Chat Público";
    let otpGenerado = "", datosTemp = {};

    function notify(text) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = "🔔 " + text;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleMenu(side) {
        if(side === 'left') document.getElementById('sidebar-left').classList.toggle('show-left');
        if(side === 'right') document.getElementById('sidebar-right').classList.toggle('show-right');
    }

    // --- SISTEMA DE REGISTRO GMAIL ---
    function solicitarCodigo() {
        const u = document.getElementById('reg-user').value.trim().toLowerCase();
        const e = document.getElementById('reg-mail').value.trim();
        const p = document.getElementById('reg-pass').value;

        if(!u || !e || !p) return notify("Faltan datos por rellenar");

        otpGenerado = Math.floor(100000 + Math.random() * 900000).toString();
        datosTemp = { u, e, p };

        notify("Enviando código a tu Gmail...");

        emailjs.send("service_xsnvy9s", "template_a6962f9", {
            to_name: u,
            to_email: e,
            message: otpGenerado
        }).then(() => {
            notify("✅ Código enviado. Revisa tu correo.");
            view('scr-otp');
        }).catch(() => notify("❌ Error al enviar el correo"));
    }

    function verificarYCrear() {
        const input = document.getElementById('otp-input').value;
        if(input === otpGenerado) {
            db.ref('usuarios/' + datosTemp.u).set({
                nombre: datosTemp.u, clave: datosTemp.p, correo: datosTemp.e,
                vip: (datosTemp.u === 'chat')
            }).then(() => {
                notify("🚀 ¡Cuenta creada! Ya puedes entrar.");
                view('scr-login');
            });
        } else {
            notify("❌ Código incorrecto");
        }
    }

    // --- LOGIN Y CHAT ---
    function login() {
        const u = document.getElementById('log-user').value.trim().toLowerCase();
        const p = document.getElementById('log-pass').value;
        db.ref('usuarios/' + u).once('value', s => {
            if(s.exists() && s.val().clave === p) {
                mUser = u; entrar(); notify("¡Hola de nuevo!");
            } else notify("❌ Usuario o clave incorrecta");
        });
    }

    function entrar() {
        view('scr-chat');
        db.ref('usuarios/' + mUser).on('value', s => { if(s.exists()) mPerf = s.val(); });
        
        db.ref('usuarios').on('value', snap => {
            const list = document.getElementById('member-list'); list.innerHTML = "";
            snap.forEach(child => {
                if(child.key === mUser) return;
                list.innerHTML += `<div onclick="iniciarPrivado('${child.key}')" style="padding:12px; border-bottom:1px solid #eee; cursor:pointer;">👤 ${child.val().nombre}</div>`;
            });
        });
        verChatPublico();
    }

    function escucharChat() {
        db.ref(chatActual).on('value', snap => {
            const box = document.getElementById('chat-box'); box.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                const isMine = data.u === mUser;
                const isAdmin = (mUser === 'chat');
                const d = document.createElement('div');
                d.className = "msg " + (isMine ? "me" : "them");
                
                let html = `<b>${data.u}</b>`;
                if(data.type === 'foto' || data.type === 'video') {
                    const locked = !mPerf.vip && !isMine && !isAdmin;
                    html += `<div style="margin-top:5px; border-radius:10px; overflow:hidden; position:relative; background:#000;">
                        ${locked?'<div style="position:absolute; inset:0; background:rgba(0,0,0,0.6); color:white; display:flex; align-items:center; justify-content:center; font-weight:bold; z-index:2;">🔒 VIP</div>':''}
                        ${data.type==='foto'?`<img src="${data.url}" class="${locked?'blur':''}" style="width:100%; filter:${locked?'blur(40px)':'none'}">`:`<video src="${data.url}" controls style="width:100%; filter:${locked?'blur(40px)':'none'}"></video>`}
                    </div>`;
                } else { html += `<span>${data.t}</span>`; }
                d.innerHTML = html; box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function abrirCloudinary(tipo) {
        cloudinary.openUploadWidget({ cloudName: CLOUD_NAME, uploadPreset: UPLOAD_PRESET }, (err, res) => {
            if (!err && res && res.event === "success") {
                db.ref(chatActual).push({ u: mUser, url: res.info.secure_url, type: tipo });
            }
        });
    }

    function enviarMsg() {
        const i = document.getElementById('msg-in');
        if(!i.value.trim()) return;
        db.ref(chatActual).push({ u: mUser, t: i.value, type: 'texto' });
        i.value = "";
    }

    function iniciarPrivado(otro) {
        chatActual = "Privados/" + [mUser, otro].sort().join("_");
        document.getElementById('chat-title').innerText = "Privado con " + otro;
        escucharChat();
        if(window.innerWidth < 1024) toggleMenu('right');
    }

    function verChatPublico() {
        chatActual = "Chat Público";
        document.getElementById('chat-title').innerText = "Chat Público";
        escucharChat();
    }
</script>
</body>
</html>
