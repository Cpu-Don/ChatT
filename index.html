<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincro MD - Prueba de Conexión</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --p: #075e54; --bg: #e5ddd5; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; height: 100vh; }
        #app { width: 100%; max-width: 450px; background: white; display: flex; flex-direction: column; position: relative; }
        .screen { display: none; padding: 25px; flex-direction: column; height: 100%; box-sizing: border-box; text-align: center; }
        .active { display: flex !important; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--p); color: white; }
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; text-align: left; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me { background: #dcf8c6; align-self: flex-end; }
        .them { background: white; align-self: flex-start; }
        .locked { background: #999; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; }
        #admin-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-reg" class="screen active" style="justify-content:center;">
        <h2 style="color:var(--p)">Sincro MD (PRUEBA)</h2>
        <p>Escribe un nombre para entrar al chat rápido:</p>
        <input type="text" id="reg-user" placeholder="Tu Nombre">
        <button class="btn" onclick="entrarDirecto()">ENTRAR AHORA</button>
        <p onclick="loginAdmin()" style="font-size:12px; color:#aaa; margin-top:20px; cursor:pointer;">Acceso Admin</p>
    </div>

    <div id="scr-chat" class="screen" style="padding:0;">
        <div class="header">
            <b>Chat de Prueba</b>
            <button id="btn-adm-nav" onclick="abrirAdmin()" style="display:none; background:orange; border:none; color:white; padding:5px; border-radius:5px;">ADMIN</button>
        </div>
        <div id="chat-box"></div>
        <div style="padding:10px; background:#eee; display:flex; gap:5px;">
            <input id="msg-in" placeholder="Escribe un mensaje..." style="margin:0;">
            <button onclick="enviarMsg('texto')" class="btn" style="width:50px; margin:0;">></button>
            <button onclick="enviarMsg('foto')" class="btn" style="width:50px; margin:0; background:#444;">📷</button>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #ddd;">
            <h3>Gestión VIP</h3>
            <button onclick="cerrarAdmin()">X</button>
        </div>
        <div id="lista-users"></div>
    </div>
</div>

<script>
    // --- INICIALIZACIÓN ---
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.database();
    const auth = firebase.auth();

    let miUser = "", esAdmin = false, miPerfil = { vip: false };

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- ENTRAR SIN CORREO (SOLO PRUEBA) ---
    function entrarDirecto() {
        const u = document.getElementById('reg-user').value.trim();
        if(!u) return alert("Escribe un nombre");
        
        miUser = u.toLowerCase().replace(/\s/g, '');
        
        // Guardar en base de datos
        db.ref('sincro_users/' + miUser).set({
            nombre: u,
            vip: false
        }).then(() => {
            entrarAlChat();
        }).catch(err => alert("Error Firebase: " + err.message));
    }

    function entrarAlChat() {
        view('scr-chat');
        if (esAdmin) document.getElementById('btn-adm-nav').style.display = "block";

        // Escuchar mi perfil
        db.ref('sincro_users/' + miUser).on('value', s => {
            if (s.exists()) miPerfil = s.val();
        });

        // Escuchar mensajes
        db.ref('sincro_mensajes').limitToLast(20).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(child => {
                const m = child.val();
                const d = document.createElement('div');
                d.className = "msg " + (m.u === miUser ? "me" : "them");
                
                if (m.type === "foto" && !miPerfil.vip && m.u !== miUser) {
                    d.innerHTML = `<b>${m.u}</b><br><div class="locked">🔒 VIP</div>`;
                } else {
                    d.innerHTML = `<b>${m.u}</b><br>${m.t}`;
                }
                box.appendChild(d);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg(tipo) {
        const inp = document.getElementById('msg-in');
        if (tipo === "texto" && !inp.value.trim()) return;
        db.ref('sincro_mensajes').push({
            u: miUser,
            t: tipo === "foto" ? "📷 Imagen VIP" : inp.value,
            type: tipo
        });
        inp.value = "";
    }

    // --- ADMIN ---
    function loginAdmin() {
        const e = prompt("Email Admin:"), p = prompt("Clave Admin:");
        if (e && p) {
            auth.signInWithEmailAndPassword(e, p).then(() => {
                esAdmin = true; miUser = "Admin"; entrarAlChat(); cargarAdmin();
            }).catch(err => alert("Error: " + err.message));
        }
    }

    function abrirAdmin() { document.getElementById('admin-panel').style.display = "block"; }
    function cerrarAdmin() { document.getElementById('admin-panel').style.display = "none"; }

    function cargarAdmin() {
        db.ref('sincro_users').on('value', s => {
            const list = document.getElementById('lista-users');
            list.innerHTML = "";
            s.forEach(child => {
                const u = child.val();
                const div = document.createElement('div');
                div.style = "padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;";
                div.innerHTML = `<span>${u.nombre} ${u.vip ? '⭐' : ''}</span>`;
                const b = document.createElement('button');
                b.innerText = u.vip ? "Quitar VIP" : "Hacer VIP";
                b.onclick = () => db.ref('sincro_users/' + child.key + '/vip').set(!u.vip);
                div.appendChild(b);
                list.appendChild(div);
            });
        });
    }
</script>
</body>
</html>
