<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincro MD - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        :root { --p: #075e54; --s: #25d366; --bg: #e5ddd5; }
        body { font-family: sans-serif; margin: 0; background: #f0f2f5; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #app { width: 100%; max-width: 450px; background: white; position: relative; display: flex; flex-direction: column; }
        .screen { display: none; padding: 25px; flex-direction: column; height: 100%; box-sizing: border-box; }
        .active { display: flex !important; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--p); color: white; margin-top: 10px; }
        .header { background: var(--p); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg); display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me { background: #dcf8c6; align-self: flex-end; }
        .them { background: white; align-self: flex-start; }
        .locked { background: #999; height: 120px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; position: relative; overflow: hidden; }
        .locked::after { content: '🔒'; font-size: 30px; }
        #admin-panel { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-reg" class="screen active" style="justify-content:center; text-align:center;">
        <h1 style="color:var(--p); margin-bottom:0;">Sincro MD</h1>
        <p style="color:#666;">Sistema de Chat Seguro</p>
        <input type="text" id="reg-user" placeholder="Tu Nombre o Alias">
        <input type="email" id="reg-mail" placeholder="tu-correo@gmail.com">
        <input type="password" id="reg-pass" placeholder="Crea una clave">
        <button class="btn" onclick="enviarOTP()">RECIBIR CÓDIGO POR GMAIL</button>
        <p onclick="loginAdmin()" style="font-size:12px; color:#999; margin-top:30px; cursor:pointer;">Acceso Administrador</p>
    </div>

    <div id="scr-verify" class="screen" style="justify-content:center; text-align:center;">
        <h2>Verifica tu Correo</h2>
        <p>Escribe el código que te enviamos:</p>
        <input type="number" id="otp-input" placeholder="000000" style="text-align:center; font-size:24px; letter-spacing:5px;">
        <button class="btn" onclick="confirmarOTP()">VERIFICAR Y ENTRAR</button>
        <button class="btn" style="background:#666;" onclick="view('scr-reg')">Volver</button>
    </div>

    <div id="scr-chat" class="screen" style="padding:0;">
        <div class="header">
            <b>Sincro MD - Chat</b>
            <button id="btn-adm" onclick="abrirAdmin()" style="display:none; background:orange; border:none; padding:5px 10px; color:white; border-radius:5px; font-weight:bold; cursor:pointer;">ADMIN</button>
        </div>
        <div id="chat-box"></div>
        <div style="padding:10px; background:#f0f0f0; display:flex; gap:5px;">
            <input id="msg-in" placeholder="Escribe un mensaje..." style="margin:0;">
            <button onclick="enviarMsg('texto')" class="btn" style="width:50px; margin:0;">></button>
            <button onclick="enviarMsg('foto')" class="btn" style="width:50px; margin:0; background:#444;">📷</button>
        </div>
    </div>

    <div id="admin-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid #eee; padding-bottom:10px;">
            <h3>Control VIP</h3>
            <button onclick="cerrarAdmin()">Cerrar X</button>
        </div>
        <div id="lista-users" style="margin-top:15px;"></div>
    </div>
</div>

<script>
    // --- INICIALIZACIÓN ---
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    emailjs.init("BrWqcYWEajAbCMVYM"); // Tu Public Key

    let datosTemp = {}, codigoReal = "", miUser = "", esAdmin = false, miPerfil = { vip: false };

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- LÓGICA DE REGISTRO ---
    function enviarOTP() {
        const u = document.getElementById('reg-user').value.trim();
        const m = document.getElementById('reg-mail').value.trim();
        const p = document.getElementById('reg-pass').value.trim();

        if(!u || !m || !p) return alert("Por favor, llena todos los campos");

        codigoReal = Math.floor(100000 + Math.random() * 900000).toString();
        datosTemp = { user: u, mail: m, pass: p };

        emailjs.send("service_ahvtgiw", "template_jsynwd9", {
            to_name: u,
            to_email: m,
            code: codigoReal
        }).then(() => {
            alert("¡Código enviado! Revisa tu Gmail (o Spam)");
            view('scr-verify');
        }).catch(err => alert("Error al enviar: " + JSON.stringify(err)));
    }

    function confirmarOTP() {
        const input = document.getElementById('otp-input').value;
        if(input === codigoReal) {
            miUser = datosTemp.user.toLowerCase().replace(/\s/g, '');
            // Registro automático con VIP desactivado
            db.ref('sincro_users/' + miUser).set({
                nombre: datosTemp.user,
                correo: datosTemp.mail,
                vip: false
            }).then(() => {
                alert("¡Verificado!");
                entrarAlChat();
            });
        } else {
            alert("Código incorrecto");
        }
    }

    // --- LÓGICA DEL CHAT ---
    function entrarAlChat() {
        view('scr-chat');
        if(esAdmin) document.getElementById('btn-adm').style.display = "block";

        // Escuchar mi propio estado VIP en tiempo real
        db.ref('sincro_users/' + miUser).on('value', s => {
            if(s.exists()) miPerfil = s.val();
        });

        // Cargar mensajes
        db.ref('sincro_mensajes').limitToLast(40).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = "";
            s.forEach(child => {
                const m = child.val();
                const div = document.createElement('div');
                div.className = "msg " + (m.u === miUser ? "me" : "them");
                
                // Si es foto y NO soy VIP (y no es mi propio mensaje)
                if(m.type === "foto" && !miPerfil.vip && m.u !== miUser) {
                    div.innerHTML = `<b>${m.u}</b><br><div class="locked"></div><small style="color:red">Solo para VIPs</small>`;
                } else {
                    div.innerHTML = `<b>${m.u}</b><br>${m.t}`;
                }
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg(tipo) {
        const inp = document.getElementById('msg-in');
        if(tipo === "texto" && !inp.value.trim()) return;
        
        db.ref('sincro_mensajes').push({
            u: miUser,
            t: tipo === "foto" ? "📷 Foto/Video" : inp.value,
            type: tipo
        });
        inp.value = "";
    }

    // --- LÓGICA ADMIN ---
    function loginAdmin() {
        const email = prompt("Email de Administrador:");
        const pass = prompt("Contraseña:");
        if(email && pass) {
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    esAdmin = true;
                    miUser = "Admin";
                    entrarAlChat();
                    cargarListaAdmin();
                }).catch(err => alert("Acceso denegado: " + err.message));
        }
    }

    function abrirAdmin() { document.getElementById('admin-panel').style.display = "block"; }
    function cerrarAdmin() { document.getElementById('admin-panel').style.display = "none"; }

    function cargarListaAdmin() {
        db.ref('sincro_users').on('value', s => {
            const list = document.getElementById('lista-users');
            list.innerHTML = "";
            s.forEach(child => {
                const u = child.val();
                const d = document.createElement('div');
                d.style = "padding:10px; margin-bottom:10px; background:#f9f9f9; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ddd;";
                d.innerHTML = `<span><b>${u.nombre}</b><br><small>${u.vip ? '⭐ VIP Activo' : 'Básico'}</small></span>`;
                
                const b = document.createElement('button');
                b.innerText = u.vip ? "Quitar VIP" : "Dar VIP";
                b.style = "padding:5px 10px; cursor:pointer;";
                b.onclick = () => db.ref('sincro_users/' + child.key + '/vip').set(!u.vip);
                
                d.appendChild(b);
                list.appendChild(d);
            });
        });
    }
</script>

</body>
</html>
