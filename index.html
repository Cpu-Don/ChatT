<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sincro MD - v2.0</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --side-bg: #ffffff; }
        * { box-sizing: border-box; transition: 0.2s; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0e1621; font-family: sans-serif; overflow: hidden; }
        #app { width: 100%; height: 100%; background: white; display: flex; overflow: hidden; position: relative; }
        
        /* Notificaciones */
        #toast-container { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); z-index: 9999; }
        .toast { background: #333; color: white; padding: 10px 20px; border-radius: 20px; font-size: 13px; margin-bottom: 5px; }

        /* Estructura */
        #sidebar-left { width: 280px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; }
        #chat-section { flex: 1; display: flex; flex-direction: column; background: var(--tg-bg); }
        
        .header { height: 55px; background: white; display: flex; align-items: center; padding: 0 15px; justify-content: space-between; border-bottom: 1px solid #eee; }
        #chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; font-size: 14px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .me { align-self: flex-end; background: #efffde; }
        .them { align-self: flex-start; background: white; }
        .msg b { display: block; color: var(--tg-blue); font-size: 11px; cursor: pointer; margin-bottom: 3px; }

        footer { padding: 8px; background: white; display: flex; gap: 8px; align-items: center; }
        #msg-in { flex: 1; padding: 10px; border-radius: 20px; border: 1px solid #ddd; outline: none; }

        /* Pantallas */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: #0088cc; color: white; }
        .active { display: flex; }
        .in-style { padding: 12px; width: 80%; max-width: 300px; margin: 5px; border-radius: 8px; border: none; }
        
        .status-dot { width: 9px; height: 9px; background: #4caf50; border-radius: 50%; border: 2px solid white; position: absolute; bottom: 0; right: 0; }
        .section-label { padding: 8px 15px; background: #f4f4f4; font-size: 10px; color: #888; font-weight: bold; }
        
        @media (max-width: 1023px) {
            #sidebar-left { position: absolute; left: -280px; height: 100%; z-index: 100; transition: 0.3s; }
            .show-left { left: 0 !important; }
        }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div id="app">
    <div id="scr-login" class="screen active">
        <h1>Sincro MD</h1>
        <input type="email" id="log-mail" class="in-style" placeholder="Correo">
        <input type="password" id="log-pass" class="in-style" placeholder="Contraseña">
        <button onclick="login()" style="padding:10px 40px; border-radius:20px; border:none; margin-top:10px; font-weight:bold;">ENTRAR</button>
        <p onclick="view('scr-reg')" style="font-size:12px; margin-top:20px; cursor:pointer;">Crear cuenta nueva</p>
    </div>

    <div id="scr-reg" class="screen">
        <h1>Registro</h1>
        <input type="text" id="reg-user" class="in-style" placeholder="Nombre de Usuario">
        <input type="email" id="reg-mail" class="in-style" placeholder="Correo">
        <input type="password" id="reg-pass" class="in-style" placeholder="Clave (6+ carac.)">
        <button onclick="registro()" style="padding:10px 40px; border-radius:20px; border:none; margin-top:10px; font-weight:bold;">REGISTRAR</button>
        <p onclick="view('scr-login')" style="font-size:12px; margin-top:20px; cursor:pointer;">Volver al login</p>
    </div>

    <div id="scr-chat" class="screen" style="flex-direction: row; padding: 0; background: white; color: black;">
        <aside id="sidebar-left">
            <div style="padding:15px; background:#0088cc; color:white; display:flex; justify-content:space-between; align-items:center;">
                <b id="mi-nombre-perfil">Cargando...</b>
                <button onclick="editarMiPerfil()" style="background:none; border:1px solid white; color:white; border-radius:5px; font-size:10px; cursor:pointer;">EDITAR</button>
            </div>
            
            <div onclick="verChatPublico()" style="padding:15px; background:#eef5f9; cursor:pointer; font-weight:bold; border-bottom:1px solid #ddd;">
                Chat Público 🌐
            </div>

            <div class="section-label">CHATS RECIENTES</div>
            <div id="recent-list" style="max-height: 150px; overflow-y:auto; border-bottom:1px solid #eee;"></div>

            <div class="section-label">EN LÍNEA</div>
            <div id="online-list" style="flex:1; overflow-y:auto;"></div>

            <button onclick="logout()" style="padding:10px; border:none; background:#fff; color:red; cursor:pointer; border-top:1px solid #eee;">Cerrar Sesión</button>
        </aside>

        <main id="chat-section">
            <header class="header">
               <button onclick="toggleMenu()" style="border:none; background:none; font-size:20px;">☰</button>
               <b id="chat-title">Sincro MD</b>
               <div style="width:20px;"></div>
            </header>
            <div id="chat-box"></div>
            <footer>
               <button onclick="abrirCloudinary()" style="border:none; background:none; font-size:22px; cursor:pointer;">📎</button>
               <input id="msg-in" placeholder="Escribe algo..." autocomplete="off">
               <button onclick="enviarMsg()" style="background:#0088cc; color:white; border:none; width:35px; height:35px; border-radius:50%; cursor:pointer;">➤</button>
            </footer>
        </main>
    </div>
</div>

<script>
    const firebaseConfig = { 
        databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/",
        apiKey: "AIzaSyB2GH_bFRmRwhqtaBb3ll_9eNEMXj7RuMo" 
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database(), auth = firebase.auth();
    
    let mUser = null, mData = null, chatActual = "Sincro_Chat_Publico", listener = null;

    function notify(t) {
        const c = document.getElementById('toast-container');
        const e = document.createElement('div'); e.className = 'toast'; e.innerText = t;
        c.appendChild(e); setTimeout(() => e.remove(), 3000);
    }

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function toggleMenu() { document.getElementById('sidebar-left').classList.toggle('show-left'); }

    // AUTH LÓGICA
    auth.onAuthStateChanged(user => {
        if (user) {
            mUser = user;
            db.ref('Sincro_Usuarios/' + user.uid).on('value', snap => {
                mData = snap.val();
                if(!mData) {
                    const nom = user.email.split('@')[0];
                    db.ref('Sincro_Usuarios/' + user.uid).set({ nombre: nom, online: true });
                } else {
                    document.getElementById('mi-nombre-perfil').innerText = mData.nombre;
                    iniciarApp();
                }
            });
            db.ref('Sincro_Usuarios/' + user.uid + '/online').set(true);
            db.ref('Sincro_Usuarios/' + user.uid + '/online').onDisconnect().set(false);
        } else {
            view('scr-login');
        }
    });

    function registro() {
        const u = document.getElementById('reg-user').value.trim(), e = document.getElementById('reg-mail').value.trim(), p = document.getElementById('reg-pass').value;
        if(!u || !e || p.length < 6) return notify("⚠️ Datos inválidos");
        auth.createUserWithEmailAndPassword(e, p).then(res => {
            db.ref('Sincro_Usuarios/' + res.user.uid).set({ nombre: u, online: false });
            notify("✅ Registrado");
            view('scr-login');
        }).catch(err => notify("❌ " + err.message));
    }

    function login() {
        const e = document.getElementById('log-mail').value.trim(), p = document.getElementById('log-pass').value;
        auth.signInWithEmailAndPassword(e, p).catch(err => notify("❌ " + err.message));
    }

    function logout() { db.ref('Sincro_Usuarios/' + mUser.uid + '/online').set(false).then(() => auth.signOut()); }

    // FUNCIÓN PARA CAMBIAR NOMBRE
    function editarMiPerfil() {
        const nuevoNombre = prompt("Escribe tu nuevo nombre de usuario:", mData.nombre);
        if(nuevoNombre && nuevoNombre.trim() !== "") {
            db.ref('Sincro_Usuarios/' + mUser.uid + '/nombre').set(nuevoNombre.trim())
            .then(() => notify("✅ Nombre actualizado"));
        }
    }

    function iniciarApp() {
        view('scr-chat');
        
        // Cargar lista de personas (Solo los que están online)
        db.ref('Sincro_Usuarios').on('value', snap => {
            const list = document.getElementById('online-list');
            list.innerHTML = "";
            snap.forEach(child => {
                const u = child.val();
                if(child.key === mUser.uid) return;
                
                list.innerHTML += `
                <div onclick="iniciarPrivado('${child.key}', '${u.nombre}')" style="display:flex; align-items:center; padding:10px; cursor:pointer; border-bottom:1px solid #f2f2f2;">
                    <div style="width:30px; height:30px; border-radius:50%; background:#0088cc; color:white; display:flex; align-items:center; justify-content:center; margin-right:10px; font-weight:bold; position:relative; font-size:12px;">
                        ${u.nombre[0].toUpperCase()}${u.online ? '<div class="status-dot"></div>' : ''}
                    </div>
                    <b style="font-size:13px; color:${u.online?'#000':'#aaa'}">${u.nombre}</b>
                </div>`;
            });
        });

        // Chats Recientes
        db.ref('Sincro_Recientes/' + mUser.uid).on('value', snap => {
            const listRec = document.getElementById('recent-list');
            listRec.innerHTML = "";
            snap.forEach(child => {
                const r = child.val();
                listRec.innerHTML += `<div onclick="iniciarPrivado('${child.key}', '${r.nombre}')" style="padding:10px; cursor:pointer; font-size:13px; border-bottom:1px solid #f9f9f9;">👤 ${r.nombre}</div>`;
            });
        });

        if(!listener) verChatPublico();
    }

    function escucharChat() {
        const box = document.getElementById('chat-box'); box.innerHTML = "";
        if(listener) db.ref(chatActual).off();
        listener = db.ref(chatActual).on('child_added', snap => {
            const data = snap.val(), isMine = data.uid === mUser.uid;
            const d = document.createElement('div'); d.className = "msg " + (isMine ? "me" : "them");
            d.innerHTML = `<b>${data.user}</b><span>${data.msg}</span>`;
            box.appendChild(d);
            box.scrollTop = box.scrollHeight;
        });
    }

    function enviarMsg() {
        const input = document.getElementById('msg-in'); if(!input.value.trim()) return;
        db.ref(chatActual).push({ uid: mUser.uid, user: mData.nombre, msg: input.value, timestamp: Date.now() });
        input.value = "";
    }

    function verChatPublico() {
        chatActual = "Sincro_Chat_Publico";
        document.getElementById('chat-title').innerText = "Chat Público";
        escucharChat();
    }

    function iniciarPrivado(id, nom) {
        chatActual = "Sincro_Privados/" + [mUser.uid, id].sort().join("_");
        document.getElementById('chat-title').innerText = nom;
        db.ref('Sincro_Recientes/' + mUser.uid + '/' + id).set({ nombre: nom });
        escucharChat();
        if(window.innerWidth < 1024) toggleMenu();
    }
</script>
</body>
</html>
