<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sincro MD - Panel de Control</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root { --tg-blue: #0088cc; --tg-bg: #54759e; --msg-in: #ffffff; --msg-out: #efffde; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; }
        
        #app { width: 100%; max-width: 1000px; height: 95vh; margin: auto; background: white; display: flex; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }

        /* --- PANTALLA REGISTRO --- */
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; }
        .active { display: flex; }
        #scr-reg { background: linear-gradient(135deg, var(--tg-blue), #004466); color: white; justify-content: center; align-items: center; padding: 40px; text-align: center; }
        .in-reg { width: 300px; padding: 15px; margin: 10px; border-radius: 10px; border: none; outline: none; }

        /* --- PANTALLA CHAT (LAYOUT DOBLE) --- */
        #main-container { display: flex; width: 100%; height: 100%; }

        /* LATERAL MULTIMEDIA (IZQUIERDA) */
        #sidebar { width: 30%; background: #f8f9fa; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
        .side-header { background: #eee; padding: 15px; font-weight: bold; border-bottom: 1px solid #ddd; text-align: center; }
        #media-list { flex: 1; overflow-y: auto; padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; align-content: start; }
        .media-item { aspect-ratio: 1; background: #ddd; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #777; border: 1px solid #ccc; position: relative; overflow: hidden; }
        .media-item.locked::after { content: "🔒"; position: absolute; background: rgba(0,0,0,0.5); width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: white; }

        /* CHAT PRINCIPAL (DERECHA) */
        #chat-section { width: 70%; display: flex; flex-direction: column; background: var(--tg-bg); position: relative; }
        .chat-header { background: var(--tg-blue); color: white; padding: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 75%; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .me { background: var(--msg-out); align-self: flex-end; border-bottom-right-radius: 2px; }
        .them { background: var(--msg-in); align-self: flex-start; border-bottom-left-radius: 2px; }

        .footer { padding: 15px; background: white; display: flex; gap: 10px; }
        #msg-in { flex: 1; padding: 12px; border-radius: 20px; border: 1px solid #ddd; outline: none; }
        .btn-send { background: var(--tg-blue); color: white; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 20px; }

        @media (max-width: 700px) { #sidebar { display: none; } #chat-section { width: 100%; } }
    </style>
</head>
<body>

<div id="app">
    <div id="scr-reg" class="screen active">
        <h1>Sincro MD</h1>
        <input type="text" id="reg-user" class="in-reg" placeholder="Tu Nombre">
        <input type="email" id="reg-mail" class="in-reg" placeholder="tu-correo@gmail.com">
        <button class="in-reg" style="background:white; color:var(--tg-blue); font-weight:bold; cursor:pointer;" onclick="enviarOTP()">ENTRAR</button>
    </div>

    <div id="scr-verify" class="screen" style="justify-content:center; align-items:center;">
        <h2>Código de Seguridad</h2>
        <input type="number" id="otp-input" class="in-reg" style="background:#eee; text-align:center; font-size:30px;">
        <button class="in-reg" style="background:var(--tg-blue); color:white;" onclick="confirmarOTP()">VERIFICAR</button>
    </div>

    <div id="scr-chat" class="screen">
        <div id="main-container">
            <div id="sidebar">
                <div class="side-header">Multimedia VIP</div>
                <div id="media-list">
                    </div>
            </div>
            <div id="chat-section">
                <div class="chat-header">
                    <span>Chat Público</span>
                    <span>⚡ Sincro</span>
                </div>
                <div id="chat-box"></div>
                <div class="footer">
                    <button onclick="enviarMsg('foto')" style="background:none; border:none; font-size:24px; cursor:pointer;">📷</button>
                    <input id="msg-in" placeholder="Mensaje..." onkeypress="if(event.key === 'Enter') enviarMsg('texto')">
                    <button onclick="enviarMsg('texto')" class="btn-send">➤</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://micanalmaestro-default-rtdb.firebaseio.com/" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    emailjs.init("BrWqcYWEajAbCMVYM");

    let dTemp = {}, codeReal = "", mUser = "", mPerf = { vip: false };

    function view(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function enviarOTP() {
        const u = document.getElementById('reg-user').value.trim();
        const m = document.getElementById('reg-mail').value.trim();
        if(!u || !m) return;
        codeReal = Math.floor(100000 + Math.random() * 900000).toString();
        dTemp = { user: u, mail: m };
        emailjs.send("service_ahvtgiw", "template_jsynwd9", { to_name: u, to_email: m, code: codeReal })
        .then(() => view('scr-verify'));
    }

    function confirmarOTP() {
        if(document.getElementById('otp-input').value === codeReal) {
            mUser = dTemp.user.toLowerCase().replace(/\s/g, '');
            db.ref('usuarios/' + mUser).set({ nombre: dTemp.user, vip: false }).then(() => entrar());
        }
    }

    function entrar() {
        view('scr-chat');
        db.ref('usuarios/' + mUser).on('value', s => { if(s.exists()) mPerf = s.val(); });

        // Cargar Chat y Multimedia desde "Chat Público"
        db.ref('Chat Público').on('value', s => {
            const b = document.getElementById('chat-box'); 
            const mList = document.getElementById('media-list');
            b.innerHTML = ""; mList.innerHTML = "";
            
            s.forEach(c => {
                const data = c.val();
                
                // Añadir al chat
                const d = document.createElement('div');
                d.className = "msg " + (data.u === mUser ? "me" : "them");
                if(data.type === "foto" && !mPerf.vip && data.u !== mUser) {
                    d.innerHTML = `<b>${data.u}</b>🔒 Multimedia VIP`;
                } else {
                    d.innerHTML = `<b>${data.u}</b>${data.t}`;
                }
                b.appendChild(d);

                // Añadir al lateral si es foto
                if(data.type === "foto") {
                    const item = document.createElement('div');
                    item.className = "media-item " + (mPerf.vip || data.u === mUser ? "" : "locked");
                    item.innerHTML = (mPerf.vip || data.u === mUser) ? "🖼️" : "";
                    mList.appendChild(item);
                }
            });
            b.scrollTop = b.scrollHeight;
        });
    }

    function enviarMsg(t) {
        const i = document.getElementById('msg-in');
        if(t === "texto" && !i.value.trim()) return;
        db.ref('Chat Público').push({ u: mUser, t: t === "foto" ? "📷 Nueva Foto" : i.value, type: t });
        i.value = "";
    }
</script>
</body>
</html>
